<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--text:#eaf3f9;--text-dim:#86a0b7;
    --hero:#e8a33d;--pet:#4fa8e8;--sys:#8fd6a8;--fire:#ff7a2e;--bad:#ef4444;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:16px 12px 60px;}
  h1{font-family:'Rajdhani',sans-serif;font-size:1.35rem;margin:0 0 4px;}
  .wrap{max-width:600px;margin:0 auto;}
  header{text-align:center;margin-bottom:12px;position:relative;}
  .eyebrow{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ice-dim);}
  p.sub{font-size:.8rem;color:var(--text-dim);margin:2px 0 0;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .back{display:inline-block;color:var(--ice-dim);text-decoration:none;font-size:.8rem;}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:14px;}
  .btn{background:transparent;border:1px solid var(--line);color:var(--text-dim);padding:9px 14px;
    border-radius:9px;font-size:.82rem;font-weight:600;cursor:pointer;}
  .btn.fire{background:linear-gradient(90deg,var(--fire),#ffb938);border:none;color:#08131f;font-weight:800;}
  input{background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:9px 11px;border-radius:9px;font-size:.85rem;width:100%;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:.74rem;color:var(--text-dim);margin-bottom:5px;}

  .dayHero{text-align:center;padding:6px 0 2px;}
  .dayHero .n{font-family:'Rajdhani';font-weight:700;font-size:2.1rem;color:var(--fire);line-height:1;}
  .dayHero .l{font-size:.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}

  .filters{display:flex;gap:6px;margin-bottom:12px;}
  .chip{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--line);background:var(--bg-deep);
    color:var(--text-dim);font-size:.74rem;font-weight:700;cursor:pointer;text-align:center;}
  .chip.on{border-color:var(--fire);color:var(--fire);background:rgba(255,122,60,.1);}

  .mRow{display:flex;align-items:center;gap:10px;padding:10px 4px;border-top:1px solid var(--line);border-left:3px solid transparent;padding-left:9px;}
  .mRow:first-child{border-top:none;}
  .mRow.hero{border-left-color:var(--hero);}
  .mRow.pet{border-left-color:var(--pet);}
  .mRow.sys{border-left-color:var(--sys);}
  .mRow.past{opacity:.4;}
  .mIco{font-size:1.1rem;width:24px;text-align:center;flex:none;}
  .mBody{flex:1;min-width:0;}
  .mName{font-size:.86rem;font-weight:600;color:var(--text);}
  .mDate{font-size:.72rem;color:var(--text-dim);}
  .mWhen{font-size:.76rem;font-weight:700;text-align:right;flex:none;min-width:64px;}
  .mWhen.soon{color:var(--fire);}
  .mWhen.today{color:#22c55e;}
  .mWhen.past{color:var(--text-dim);}

  .setupBox{text-align:center;padding:20px 10px;}
  .setupBox p{font-size:.85rem;color:var(--text-dim);margin:8px 0 16px;}
  .gate{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:.9rem;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0e2718;color:#8ff0b0;
    border:1px solid #1f5a3a;padding:10px 18px;border-radius:10px;font-size:.82rem;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;}
  .toast.show{opacity:1;}

  /* language selector — shared look across Phoenix */
  .lang-box{position:relative;}
  .lang-btn{display:flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text-dim);font-family:'Inter';font-weight:600;font-size:.74rem;padding:6px 11px;border-radius:13px;cursor:pointer;}
  .lang-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:8px;display:none;grid-template-columns:repeat(2,1fr);gap:2px;width:250px;
    max-height:60vh;overflow-y:auto;box-shadow:0 16px 40px -8px rgba(0,0,0,.5);z-index:60;}
  .lang-menu.open{display:grid;}
  .lang-menu button{background:none;border:none;color:var(--text-dim);text-align:left;font-family:'Inter';
    font-weight:500;font-size:.8rem;padding:8px 9px;border-radius:9px;cursor:pointer;}
  .lang-menu button:hover{background:var(--panel-2);color:var(--text);}
  .lang-menu button.active{color:var(--fire);font-weight:700;}
</style>
</head>

function getState(){
  const q=new URLSearchParams(location.search).get('s');
  if(q&&/^\d{3,5}$/.test(q)){ try{localStorage.setItem('phx_state',q);}catch(e){} return q; }
  try{ const ls=localStorage.getItem('phx_state'); if(ls&&/^\d{3,5}$/.test(ls)) return ls; }catch(e){}
  return '3139';
}
const S=getState();
(function(){
  const bl=document.getElementById('backLink');
  if(bl && S && S!=='3139') bl.href='phoenix-tools.html?s='+S;
})();
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

let startDate=null, isLeader=false, showPast=false, filterType='all';

function fmtDate(dt){
  return dt.toLocaleDateString(PhxI18N.getLang(),{month:'short',day:'numeric',year:'numeric'});
}
function dayNumber(){
  const today=new Date(); today.setHours(0,0,0,0);
  const sd=new Date(startDate+'T00:00:00');
  return Math.floor((today-sd)/86400000);
}
function render(){
  const app=document.getElementById('app');
  const curDay=dayNumber();
  let html=`<div class="panel dayHero"><div class="n">${T('day')} ${curDay}</div><div class="l">${T('ofServer')}</div></div>`;
  html+=`<div class="filters">
    <div class="chip ${filterType==='all'?'on':''}" data-f="all">${T('filterAll')}</div>
    <div class="chip ${filterType==='hero'?'on':''}" data-f="hero">${T('filterHero')}</div>
    <div class="chip ${filterType==='pet'?'on':''}" data-f="pet">${T('filterPet')}</div>
    <div class="chip ${filterType==='sys'?'on':''}" data-f="sys">${T('filterSys')}</div>
  </div>`;
  html+=`<div class="panel" id="mList"></div>`;
  if(isLeader){
    html+=`<div class="panel">
      <div class="field"><label>${T('startDateLabel')}</label><input type="date" id="startInput" value="${startDate||''}"></div>
      <button class="btn fire" id="saveStartBtn" style="width:100%;">${T('saveStart')}</button>
    </div>`;
  }
  app.innerHTML=html;

  const sd=new Date(startDate+'T00:00:00');
  const list=document.getElementById('mList');
  let rows=MILESTONES.filter(m=>filterType==='all'||m.t===filterType);
  if(!showPast) rows=rows.filter(m=>(m.d-curDay)>=-1);
  if(!rows.length){ list.innerHTML=`<p style="font-size:.82rem;color:var(--text-dim);text-align:center;padding:10px;">${T('nothingFiltered')} <span id="showPastLink" style="text-decoration:underline;cursor:pointer;color:var(--ice-dim);">${T('showPast')}</span></p>`; }
  else{
    list.innerHTML=rows.map(m=>{
      const diff=m.d-curDay;
      const evDate=new Date(sd.getTime()+m.d*86400000);
      let whenTxt, whenCls;
      if(diff===0){whenTxt=T('today');whenCls='today';}
      else if(diff<0){whenTxt=T('daysAgo').replace('{n}',Math.abs(diff));whenCls='past';}
      else{whenTxt=T('inDays').replace('{n}',diff);whenCls=diff<=14?'soon':'';}
      return `<div class="mRow ${m.t} ${diff<0?'past':''}">
        <div class="mIco">${m.i}</div>
        <div class="mBody"><div class="mName">${m.n}</div><div class="mDate">${fmtDate(evDate)}</div></div>
        <div class="mWhen ${whenCls}">${whenTxt}</div>
      </div>`;
    }).join('');
  }
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filterType=c.dataset.f;render();});
  const spl=document.getElementById('showPastLink'); if(spl) spl.onclick=()=>{showPast=true;render();};
  const sb2=document.getElementById('saveStartBtn');
  if(sb2) sb2.onclick=async()=>{
    const v=document.getElementById('startInput').value;
    if(!v){toast(T('pickDate'));return;}
    sb2.textContent='…';sb2.disabled=true;
    const{error}=await sb.from('states').update({server_start_date:v}).eq('id',S);
    sb2.textContent=T('saveStart');sb2.disabled=false;
    if(error){toast(T('failed')+' '+error.message);return;}
    startDate=v; toast(T('saved')); render();
  };
}

function renderSetup(){
  document.getElementById('app').innerHTML=`<div class="panel setupBox">
    <div style="font-size:2rem;">📅</div>
    <p>${T('setupText')}</p>
    <div class="field" style="text-align:left;"><label>${T('startDateLabel')}</label><input type="date" id="startInput2"></div>
    <button class="btn fire" id="saveStartBtn2" style="width:100%;margin-top:8px;">${T('saveCalc')}</button>
  </div>`;
  document.getElementById('saveStartBtn2').onclick=async()=>{
    const v=document.getElementById('startInput2').value;
    if(!v){toast(T('pickDate'));return;}
    const{error}=await sb.from('states').update({server_start_date:v}).eq('id',S);
    if(error){toast(T('failed')+' '+error.message);return;}
    startDate=v; render();
  };
}

function renderCurrent(){
  if(!startDate){ if(isLeader) renderSetup(); else document.getElementById('app').innerHTML=`<div class="gate">${T('gateText')}</div>`; return; }
  render();
}

async function init(){
  PhxI18N.init(DICT, ()=>{ renderCurrent(); });
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    const{data:rows}=await sb.from('players').select('role,alliance_id,state_id').eq('owner',session.user.id);
    isLeader=(rows||[]).some(p=>p.role==='admin'||((p.role==='r4'||p.role==='r5')&&p.state_id===S));
  }
  const{data:st}=await sb.from('states').select('server_start_date').eq('id',S).maybeSingle();
  startDate=st&&st.server_start_date;
  renderCurrent();
}
init();
</script>
