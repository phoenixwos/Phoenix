<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>VP Schedule — Phoenix</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--text:#eaf3f9;--text-dim:#86a0b7;--fire:#ff7a2e;--good:#22c55e;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:16px 10px 60px;}
  h1{font-family:'Rajdhani',sans-serif;font-size:1.3rem;margin:0 0 4px;}
  .wrap{max-width:900px;margin:0 auto;}
  header{text-align:center;margin-bottom:12px;}
  .eyebrow{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ice-dim);}
  p.sub{font-size:.8rem;color:var(--text-dim);margin:2px 0 0;}
  .back{display:inline-block;color:var(--ice-dim);text-decoration:none;font-size:.8rem;margin-bottom:8px;}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:14px;padding:12px;margin-bottom:14px;}
  .panel-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ice-dim);margin-bottom:8px;font-weight:600;}
  .btn{background:transparent;border:1px solid var(--line);color:var(--text-dim);padding:9px 14px;
    border-radius:9px;font-size:.82rem;font-weight:600;cursor:pointer;}
  .btn.fire{background:linear-gradient(90deg,var(--fire),#ffb938);border:none;color:#08131f;font-weight:800;}
  select{background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:9px 11px;border-radius:9px;font-size:.85rem;font-family:inherit;}

  table{width:100%;border-collapse:collapse;font-size:.78rem;}
  th{text-align:left;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ice-dim);
    padding:5px 4px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);}
  td{padding:2px 3px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle;}
  tr.hourStart td{border-top:1px solid var(--line);}
  .timeCell{font-family:'Rajdhani';font-weight:700;color:var(--text-dim);white-space:nowrap;font-size:.78rem;padding-right:4px;}
  .cellInput{width:100%;background:var(--bg-deep);border:1px solid transparent;color:var(--text);
    padding:6px 6px;border-radius:6px;font-size:.78rem;font-family:inherit;}
  .cellInput:focus{border-color:var(--ice);outline:none;background:#0c1c2c;}
  .cellInput.saved{border-color:var(--good);}
  .moveCol{width:34px;text-align:center;white-space:nowrap;}
  .moveBtn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.85rem;padding:0 2px;line-height:1;}
  .moveBtn:hover{color:var(--fire);}
  .tableScroll{overflow-x:auto;max-height:70vh;overflow-y:auto;}

  .resultRow{display:flex;gap:8px;padding:5px 4px;border-top:1px solid rgba(255,255,255,.05);font-size:.78rem;}
  .resultRow.empty{color:var(--text-dim);opacity:.5;}
  .resultTime{font-family:'Rajdhani';font-weight:700;width:78px;flex:none;color:var(--ice-dim);}
  .resultName{flex:1;font-weight:600;}
  .resultAlliance{width:70px;flex:none;color:var(--text-dim);}

  #pasteBox{white-space:pre-wrap;background:var(--bg-deep);border:1px solid var(--line);border-radius:9px;
    padding:11px;font-size:.78rem;color:var(--text);line-height:1.5;margin-top:8px;display:none;max-height:40vh;overflow-y:auto;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#0d1b2a;
    color:#fff;padding:10px 20px;border-radius:14px;font-weight:600;font-size:.85rem;opacity:0;transition:.25s;z-index:99;border:1px solid var(--line);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #phxGate{position:fixed;inset:0;background:var(--bg-deep);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
  #phxGateMsg{max-width:320px;text-align:center;color:var(--text-dim);font-size:.9rem;line-height:1.6;}
</style>
</head>
<body>

<div id="phxGate"><div id="phxGateMsg">Checking access…</div></div>

<div class="wrap" id="mainScreen" style="display:none;">
  <a class="back" id="backLink" href="phoenix-tools.html">‹ Tools</a>
  <header>
    <div class="eyebrow">Phoenix · PXR</div>
    <h1>🗓️ VP Schedule</h1>
    <p class="sub">One shared 24h grid, 30-min slots. Every R4 fills in their own alliance's rows.</p>
  </header>

  <div class="panel">
    <div class="panel-title">✏️ Fill in the schedule</div>
    <div class="tableScroll">
      <table>
        <thead><tr>
          <th style="width:56px;">Time</th>
          <th style="min-width:110px;">Player</th>
          <th style="width:70px;">Alliance</th>
          <th style="min-width:100px;">Resources</th>
          <th style="min-width:90px;">Notes</th>
          <th class="moveCol">↕</th>
        </tr></thead>
        <tbody id="gridBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">📋 Result</div>
    <div id="resultList"></div>
  </div>

  <div class="panel">
    <div class="panel-title">📤 Export by alliance</div>
    <div class="row" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <select id="allianceSelect" style="flex:1;min-width:140px;"></select>
      <button class="btn fire" id="genPasteBtn">Generate</button>
    </div>
    <div id="pasteBox"></div>
    <button class="btn" id="copyPasteBtn" style="display:none;width:100%;margin-top:8px;">📋 Copy to clipboard</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── ACCESS GATE: admin anywhere, or R4/R5 ONLY if their alliance is PXR ── */
var SUPA_URL='https://vghutrfcrqgelvgdeesl.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnaHV0cmZjcnFnZWx2Z2RlZXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDQ4ODksImV4cCI6MjA5Nzc4MDg4OX0.uarvB0sTDPqS1AysfvDRJahRYRLiJaBO2kVIiyGaDAE';
var sb=null;
function gmsg(h){var m=document.getElementById('phxGateMsg');if(m)m.innerHTML=h;}
function getState(){var q=new URLSearchParams(location.search).get('s');if(q)return q;try{var ls=localStorage.getItem('phx_state');if(ls)return ls;}catch(e){}return '3139';}
var STATE=getState();
function unlock(){var g=document.getElementById('phxGate');if(g&&g.parentNode)g.parentNode.removeChild(g);document.getElementById('mainScreen').style.display='';boot();}
(function(){
  try{
    if(!(window.supabase&&window.supabase.createClient)){gmsg('Could not load. Reload the page.');return;}
    sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
    sb.auth.getSession().then(function(r){
      var s=r&&r.data&&r.data.session;
      if(!s){gmsg('🔒 Sign in to Phoenix first.<br><br>This tool is only for R4/R5 leaders.');return;}
      sb.from('players').select('role,alliance_id,state_id').eq('owner',s.user.id).eq('state_id',STATE).then(function(res){
        var rows=res.data||[];
        var isAdmin=rows.some(function(p){return p.role==='admin';});
        var isLeader=rows.some(function(p){return (p.role==='r4'||p.role==='r5');});
        if(isAdmin||isLeader){ unlock(); }
        else{ gmsg('🔒 This tool is only for R4/R5 leaders.'); }
      });
    });
  }catch(e){ gmsg('Error loading. Reload the page.'); }
})();
(function(){
  var bl=document.getElementById('backLink');
  if(bl && STATE && STATE!=='3139') bl.href='phoenix-tools.html?s='+STATE;
})();

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},1800);
}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function slotTime(i){
  var h=Math.floor(i/2), m=(i%2)*30;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function slotRange(i){
  var start=slotTime(i);
  var end=slotTime((i+1)%48);
  return start+'–'+end;
}

var rows=[]; // 48 entries, index = slot_index, {player_name, alliance_tag, resources, notes}
function emptyRow(){ return {player_name:'',alliance_tag:'',resources:'',notes:''}; }

async function loadSchedule(){
  rows=[]; for(var i=0;i<48;i++) rows.push(emptyRow());
  var {data}=await sb.from('vp_schedule').select('*').eq('state_id',STATE);
  (data||[]).forEach(function(r){
    if(r.slot_index>=0 && r.slot_index<48){
      rows[r.slot_index]={player_name:r.player_name||'',alliance_tag:r.alliance_tag||'',resources:r.resources||'',notes:r.notes||''};
    }
  });
}

function renderGrid(){
  var body=document.getElementById('gridBody');
  body.innerHTML='';
  for(var i=0;i<48;i++){
    (function(idx){
      var tr=document.createElement('tr');
      if(idx%2===0) tr.className='hourStart';
      var r=rows[idx];
      tr.innerHTML=
        '<td class="timeCell">'+slotTime(idx)+'</td>'+
        '<td><input class="cellInput" data-f="player_name" value="'+escapeHtml(r.player_name)+'" placeholder="—"></td>'+
        '<td><input class="cellInput" data-f="alliance_tag" value="'+escapeHtml(r.alliance_tag)+'" placeholder="tag"></td>'+
        '<td><input class="cellInput" data-f="resources" value="'+escapeHtml(r.resources)+'" placeholder="—"></td>'+
        '<td><input class="cellInput" data-f="notes" value="'+escapeHtml(r.notes)+'" placeholder="—"></td>'+
        '<td class="moveCol"><button class="moveBtn" data-m="up">▲</button><button class="moveBtn" data-m="down">▼</button></td>';
      tr.querySelectorAll('.cellInput').forEach(function(inp){
        inp.addEventListener('change',function(){
          rows[idx][inp.dataset.f]=inp.value;
          saveSlot(idx);
          inp.classList.add('saved');
          setTimeout(function(){inp.classList.remove('saved');},900);
        });
      });
      tr.querySelector('[data-m="up"]').addEventListener('click',function(){ swapRows(idx, (idx+47)%48); });
      tr.querySelector('[data-m="down"]').addEventListener('click',function(){ swapRows(idx, (idx+1)%48); });
      body.appendChild(tr);
    })(i);
  }
}

async function saveSlot(idx){
  var r=rows[idx];
  var empty=!r.player_name && !r.alliance_tag && !r.resources && !r.notes;
  if(empty){
    await sb.from('vp_schedule').delete().eq('state_id',STATE).eq('slot_index',idx);
  }else{
    await sb.from('vp_schedule').upsert({
      state_id:STATE, slot_index:idx,
      player_name:r.player_name||null, alliance_tag:r.alliance_tag||null,
      resources:r.resources||null, notes:r.notes||null,
      updated_at:new Date().toISOString()
    },{onConflict:'state_id,slot_index'});
  }
  renderResult(); renderAllianceOptions();
}

async function swapRows(a,b){
  var tmp=rows[a]; rows[a]=rows[b]; rows[b]=tmp;
  renderGrid();
  await saveSlot(a); await saveSlot(b);
  toast('Moved ✓');
}

function renderResult(){
  var box=document.getElementById('resultList');
  var html='';
  var any=false;
  for(var i=0;i<48;i++){
    var r=rows[i];
    if(!r.player_name && !r.alliance_tag) continue;
    any=true;
    html+='<div class="resultRow"><div class="resultTime">'+slotRange(i)+'</div>'+
      '<div class="resultName">'+escapeHtml(r.player_name||'—')+(r.resources?' <span style="color:var(--text-dim);">· '+escapeHtml(r.resources)+'</span>':'')+'</div>'+
      '<div class="resultAlliance">'+escapeHtml(r.alliance_tag||'')+'</div></div>';
  }
  box.innerHTML=any?html:'<div class="resultRow empty">Nothing filled in yet.</div>';
}

function renderAllianceOptions(){
  var sel=document.getElementById('allianceSelect');
  var cur=sel.value;
  var tags=[...new Set(rows.map(function(r){return (r.alliance_tag||'').trim();}).filter(Boolean))].sort();
  sel.innerHTML='<option value="">— All alliances —</option>'+tags.map(function(t){return '<option value="'+escapeHtml(t)+'">'+escapeHtml(t)+'</option>';}).join('');
  if(tags.indexOf(cur)>-1) sel.value=cur;
}

function copyText(t){
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast('Copied ✓');});}
  else{toast('Select and copy manually');}
}
function generatePaste(){
  var tag=document.getElementById('allianceSelect').value;
  var lines=['🗓️ VP SCHEDULE'+(tag?(' — ['+tag+']'):' — ALL'),''];
  var any=false;
  for(var i=0;i<48;i++){
    var r=rows[i];
    if(!r.player_name && !r.alliance_tag) continue;
    if(tag && (r.alliance_tag||'').trim()!==tag) continue;
    any=true;
    lines.push(slotRange(i)+' — '+(r.player_name||'—')+(tag?'':(r.alliance_tag?' ['+r.alliance_tag+']':''))+(r.resources?(' · '+r.resources):'')+(r.notes?(' · '+r.notes):''));
  }
  if(!any) lines.push('Nothing to show for this alliance yet.');
  var text=lines.join('\n');
  var box=document.getElementById('pasteBox');
  box.textContent=text; box.style.display='block';
  document.getElementById('copyPasteBtn').style.display='block';
  document.getElementById('copyPasteBtn').onclick=function(){copyText(text);};
}
document.getElementById('genPasteBtn').addEventListener('click',generatePaste);

async function boot(){
  await loadSchedule();
  renderGrid();
  renderResult();
  renderAllianceOptions();
}
</script>
</body>
</html>
