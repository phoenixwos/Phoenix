<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>🎯 Rally Countdown · Phoenix</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--fire:#ff7a3c;--gold:#f0b93d;
    --green:#4ade80;--green-deep:#22c55e;--danger:#ff5a5a;--text:#eaf3f9;--text-dim:#86a0b7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    min-height:100vh;color:var(--text);font-family:'Inter',sans-serif;padding:18px 16px 40px;}
  h1,.num{font-family:'Rajdhani',sans-serif;}
  .wrap{max-width:480px;margin:0 auto;}
  h1{font-size:1.05rem;text-align:center;margin-bottom:4px;color:var(--text-dim);font-weight:600;}

  .impact{text-align:center;background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1.5px solid var(--ice-dim);border-radius:20px;padding:26px 16px;margin:16px 0 18px;}
  .impact .lbl{font-size:.76rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ice-dim);margin-bottom:8px;font-weight:600;}
  .impact .clock{font-size:3.1rem;font-weight:700;color:var(--ice);letter-spacing:.02em;}
  .impact .clock.hit{color:var(--green);animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}

  .timeline{display:flex;flex-direction:column;gap:10px;}
  .tl-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1.5px solid var(--line);
    border-radius:14px;padding:14px;transition:background .2s,border-color .2s;}
  .tl-row.go{border-color:var(--green-deep);background:linear-gradient(180deg,#123420,#0e2718);animation:flash 1s ease-in-out infinite;}
  @keyframes flash{0%,100%{box-shadow:0 0 0 rgba(74,222,128,0);}50%{box-shadow:0 0 22px rgba(74,222,128,.55);}}
  .tl-badge{width:38px;height:38px;flex:none;border-radius:10px;background:var(--fire);color:#1a0800;
    display:grid;place-items:center;font-family:'Rajdhani';font-weight:700;font-size:1.15rem;}
  .tl-row.go .tl-badge{background:var(--green);}
  .tl-info{flex:1;min-width:0;}
  .tl-info .who{font-size:.98rem;font-weight:700;color:var(--text);}
  .tl-info .ratio{font-size:.74rem;color:var(--text-dim);}
  .tl-time{text-align:right;font-family:'Rajdhani';font-weight:700;font-size:1.35rem;color:var(--gold);}
  .tl-time.go{color:var(--green);font-size:1.05rem;}

  .soundgate{position:fixed;inset:0;z-index:9000;background:rgba(6,13,22,.92);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;text-align:center;padding:28px;}
  .soundgate .box{max-width:320px;}
  .soundgate .ic{font-size:2.4rem;margin-bottom:10px;}
  .soundgate p{font-size:.88rem;color:var(--text-dim);line-height:1.5;margin-bottom:18px;}
  .soundgate button{background:linear-gradient(180deg,var(--fire),#e85a18);border:none;border-radius:14px;
    color:#1a0800;font-family:'Rajdhani';font-weight:700;font-size:1.05rem;padding:14px 26px;cursor:pointer;}

  .sndbtn{position:fixed;top:14px;right:14px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--ice);border-radius:10px;padding:7px 11px;font-size:.8rem;z-index:50;}

  .state-msg{text-align:center;color:var(--text-dim);font-size:.9rem;padding:60px 20px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="topLabel">⏱️ Rally Countdown</h1>
  <div id="content"></div>
</div>

<div class="soundgate" id="soundGate">
  <div class="box">
    <div class="ic">🔊</div>
    <p>Tap to enable the alert sound.<br>Your browser requires this before it can play sound on its own.</p>
    <button id="enableSoundBtn">🔔 Enable sound</button>
  </div>
</div>

<script>
const SUPA_URL='https://vghutrfcrqgelvgdeesl.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnaHV0cmZjcnFnZWx2Z2RlZXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDQ4ODksImV4cCI6MjA5Nzc4MDg4OX0.uarvB0sTDPqS1AysfvDRJahRYRLiJaBO2kVIiyGaDAE';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

function fmt(totalSec){
  const neg=totalSec<0;
  totalSec=Math.abs(Math.round(totalSec));
  const m=Math.floor(totalSec/60), s=totalSec%60;
  return (neg?'-':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ── SOUND: simple WebAudio beeps, no external files ─────────── */
let audioCtx=null, soundOn=false;
function initAudio(){
  try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); soundOn=true; }catch(e){ soundOn=false; }
}
function beep(freq,durMs,delayMs){
  if(!soundOn||!audioCtx) return;
  setTimeout(()=>{
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=freq;
    gain.gain.setValueAtTime(0.0001,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.3,audioCtx.currentTime+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+durMs/1000);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime+durMs/1000+0.02);
  },delayMs||0);
}
function playSendAlarm(){ beep(880,180,0); beep(880,180,220); } // two short beeps: "send now"
function playImpactAlarm(){ beep(660,140,0); beep(880,140,160); beep(1100,320,320); } // triumphant triad: "impact"

document.getElementById('enableSoundBtn').onclick=()=>{
  initAudio();
  document.getElementById('soundGate').style.display='none';
  beep(880,120,0); // confirmation blip
};

/* ── LOAD THE SHARED SYNC ─────────────────────────────────────── */
const id=new URLSearchParams(location.search).get('id');
const content=document.getElementById('content');

if(!id){
  content.innerHTML='<div class="state-msg">Missing countdown link.<br>Ask your leader to share the correct link.</div>';
  document.getElementById('soundGate').style.display='none';
}else{
  load();
}

async function load(){
  content.innerHTML='<div class="state-msg">Loading countdown…</div>';
  try{
    const{data,error}=await sb.from('rally_syncs').select('*').eq('id',id).maybeSingle();
    if(error||!data){
      content.innerHTML='<div class="state-msg">This countdown wasn\'t found.<br>The leader may have calculated a new one — ask for the updated link.</div>';
      document.getElementById('soundGate').style.display='none';
      return;
    }
    render(data);
  }catch(e){
    content.innerHTML='<div class="state-msg">Connection error. Reload the page.</div>';
    document.getElementById('soundGate').style.display='none';
  }
}

function render(sync){
  const rows=sync.rows||[];
  const targetImpact=new Date(sync.target_impact_at).getTime();

  content.innerHTML=`
    <div class="impact">
      <div class="lbl">🎯 Combined impact in</div>
      <div class="clock" id="impactClock">--:--</div>
    </div>
    <div class="timeline" id="timeline">
      ${rows.map(r=>`
        <div class="tl-row" id="tlrow${r.n}">
          <div class="tl-badge">${r.n}</div>
          <div class="tl-info">
            <div class="who">${escapeHtml(r.leader)}</div>
            <div class="ratio">${r.ratio?('Ratio '+escapeHtml(r.ratio)+' · '):''}March ${fmt(r.marchSec)}</div>
          </div>
          <div class="tl-time" id="tltime${r.n}">—</div>
        </div>`).join('')}
    </div>`;

  const fired={}; // track which alarms already played this session
  function tick(){
    const now=Date.now();
    const impactLeft=(targetImpact-now)/1000;
    const clockEl=document.getElementById('impactClock');
    if(clockEl){
      clockEl.textContent = impactLeft<=0 ? '💥 IMPACT!' : fmt(impactLeft);
      clockEl.classList.toggle('hit', impactLeft<=0);
    }
    if(impactLeft<=0 && !fired.impact){ fired.impact=true; playImpactAlarm(); }

    rows.forEach(r=>{
      const sendAt=targetImpact-r.marchSec*1000;
      const left=(sendAt-now)/1000;
      const row=document.getElementById('tlrow'+r.n);
      const timeEl=document.getElementById('tltime'+r.n);
      if(!row||!timeEl) return;
      if(left<=0){
        row.classList.add('go'); timeEl.classList.add('go');
        timeEl.textContent='🚀 SEND NOW!';
        if(!fired['send'+r.n]){ fired['send'+r.n]=true; playSendAlarm(); }
      } else {
        row.classList.remove('go'); timeEl.classList.remove('go');
        timeEl.textContent='in '+fmt(left);
      }
    });
  }
  tick();
  setInterval(tick,250);
}
</script>
</body>
</html>
