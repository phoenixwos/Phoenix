<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Ratio Calculator · Phoenix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--fire:#ff7a3c;--fire-deep:#e85a18;--gold:#f0b93d;
    --green:#4ade80;--green-deep:#22c55e;--text:#eaf3f9;--text-dim:#86a0b7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    min-height:100vh;color:var(--text);font-family:'Inter',sans-serif;padding-bottom:40px;}
  h1,h2,.num{font-family:'Rajdhani',sans-serif;}
  .wrap{max-width:480px;margin:0 auto;padding:16px;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;justify-content:space-between;}
  .back{font-size:.8rem;font-weight:600;color:var(--text-dim);text-decoration:none;}
  h1{font-size:1.15rem;font-weight:700;}
  .lead{font-size:.82rem;color:var(--text-dim);line-height:1.5;margin-bottom:18px;}

  .totalbox{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:14px;padding:16px;margin-bottom:16px;}
  .totalbox label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;
    color:var(--ice-dim);margin-bottom:7px;font-weight:600;}
  .totalbox input{width:100%;background:var(--bg-deep);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-family:'Rajdhani';font-weight:700;font-size:1.4rem;padding:12px 14px;outline:none;text-align:center;}
  .totalbox input:focus{border-color:var(--ice);}
  .hint{text-align:center;font-size:.7rem;color:var(--text-dim);margin-top:6px;}

  .presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .preset{background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:12px 10px;
    text-align:center;cursor:pointer;}
  .preset.active{border-color:var(--fire);background:linear-gradient(180deg,#2a1a10,#1c1108);}
  .preset .pname{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:2px;}
  .preset .pratio{font-family:'Rajdhani';font-weight:700;font-size:.95rem;color:var(--gold);}
  .preset.active .pratio{color:var(--fire);}

  .custom-box{display:none;background:var(--panel);border:1.5px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:16px;}
  .custom-box.show{display:block;}
  .custom-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
  .custom-row input{flex:1;min-width:0;background:var(--bg-deep);border:1px solid var(--line);border-radius:9px;
    color:var(--text);font-family:'Rajdhani';font-weight:700;font-size:1rem;padding:9px;text-align:center;outline:none;}
  .custom-row input:focus{border-color:var(--ice);}
  .custom-row span{color:var(--text-dim);font-size:.85rem;}

  .results{display:flex;flex-direction:column;gap:10px;}
  .res-row{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;padding:14px 16px;}
  .res-dot{width:14px;height:14px;border-radius:50%;flex:none;}
  .res-info{flex:1;min-width:0;}
  .res-name{font-size:.82rem;color:var(--text-dim);}
  .res-pct{font-size:.72rem;color:var(--text-dim);}
  .res-amount{font-family:'Rajdhani';font-weight:700;font-size:1.35rem;color:var(--text);}

  .total-check{text-align:center;font-size:.76rem;color:var(--text-dim);margin-top:10px;}
  .total-check b{color:var(--green);}

  .lang-box{position:relative;}
  .lang-btn{display:flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text-dim);font-family:'Inter';font-weight:600;font-size:.74rem;padding:6px 11px;border-radius:13px;cursor:pointer;}
  .lang-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:8px;display:none;grid-template-columns:repeat(2,1fr);gap:2px;width:250px;
    max-height:60vh;overflow-y:auto;box-shadow:0 16px 40px -8px rgba(0,0,0,.5);z-index:60;}
  .lang-menu.open{display:grid;}
  .lang-menu button{background:none;border:none;color:var(--text-dim);text-align:left;font-family:'Inter';
    font-weight:500;font-size:.8rem;padding:8px 9px;border-radius:9px;cursor:pointer;}
  .lang-menu button:hover{background:var(--panel-2);color:var(--text);}
  .lang-menu button.active{color:var(--fire);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" id="backLink" href="phoenix-tools.html" data-i18n="back">◂ Tools</a>
    <div class="lang-box" id="langBox">
      <button class="lang-btn" id="langBtn">🌐 <span id="langLabel">EN</span></button>
      <div class="lang-menu" id="langMenu"></div>
    </div>
  </div>
  <h1 style="margin-bottom:6px;" data-i18n="title">⚖️ Troop Ratio Calculator</h1>
  <p class="lead" data-i18n="lead">Enter your total troops, pick a ratio, and see exactly how many of each type to bring.</p>

  <div class="totalbox">
    <label data-i18n="totalLabel">Total troops</label>
    <input type="text" id="totalInput" data-i18n-ph="totalPh" placeholder="e.g. 100k or 100000" inputmode="numeric">
    <div class="hint" data-i18n="hint">You can type "100k" for 100,000 — it's read automatically.</div>
  </div>

  <div class="presets" id="presets"></div>

  <div class="custom-box" id="customBox">
    <div style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ice-dim);font-weight:600;" data-i18n="customRatio">Custom ratio</div>
    <div class="custom-row">
      <input type="number" id="c1" min="0" placeholder="0">
      <span>:</span>
      <input type="number" id="c2" min="0" placeholder="0">
      <span>:</span>
      <input type="number" id="c3" min="0" placeholder="0">
    </div>
  </div>

  <div class="results" id="results"></div>
  <div class="total-check" id="totalCheck"></div>
</div>

<script src="phx-i18n.js"></script>

  var bl=document.getElementById('backLink');
  if(bl && s && s!=='3139') bl.href='phoenix-tools.html?s='+s;
})();

en:{back:"◂ Tools",title:"⚖️ Troop Ratio Calculator",lead:"Enter your total troops, pick a ratio, and see exactly how many of each type to bring.",totalLabel:"Total troops",totalPh:"e.g. 100k or 100000",hint:"You can type \"100k\" for 100,000 — it's read automatically.",customRatio:"Custom ratio",setOwn:"⚙️ set your own",totalCheck:"Total: {n} troops",presetBearTrap:"Bear Trap",presetDefense:"Defense",presetBasic:"Basic",presetCustom:"Custom",typeInfantry:"Infantry",typeLancer:"Lancer",typeMarksman:"Marksman"},

ar:{back:"◂ الأدوات",title:"⚖️ حاسبة نسبة القوات",lead:"أدخل إجمالي قواتك، اختر نسبة، وشاهد بالضبط كم عدد كل نوع يجب إحضاره.",totalLabel:"إجمالي القوات",totalPh:"مثال: 100k أو 100000",hint:"يمكنك كتابة \"100k\" لتعني 100,000 — تُقرأ تلقائيًا.",customRatio:"نسبة مخصصة",setOwn:"⚙️ حدد بنفسك",totalCheck:"الإجمالي: {n} قوات",presetBearTrap:"فخ الدب",presetDefense:"دفاع",presetBasic:"أساسي",presetCustom:"مخصص",typeInfantry:"مشاة",typeLancer:"رماحون",typeMarksman:"قناصة"},

pl:{back:"◂ Narzędzia",title:"⚖️ Kalkulator proporcji wojsk",lead:"Wpisz łączną liczbę wojsk, wybierz proporcję i zobacz dokładnie, ile zabrać każdego typu.",totalLabel:"Łącznie wojsk",totalPh:"np. 100k lub 100000",hint:"Możesz wpisać „100k\" zamiast 100 000 — jest odczytywane automatycznie.",customRatio:"Własna proporcja",setOwn:"⚙️ ustaw własną",totalCheck:"Razem: {n} wojsk",presetBearTrap:"Pułapka na Niedźwiedzia",presetDefense:"Obrona",presetBasic:"Podstawowa",presetCustom:"Własna",typeInfantry:"Piechota",typeLancer:"Lansjerzy",typeMarksman:"Strzelcy"},

};
const T=(k)=>PhxI18N.t(k);

const COLORS=['#ff7a3c','#7fd9ee','#f0b93d'];
const TYPE_KEYS=['typeInfantry','typeLancer','typeMarksman'];
const PRESET_DEFS=[
  { key:'presetBearTrap', ratio:[10,10,80] },
  { key:'presetDefense',  ratio:[60,40,0]  },
  { key:'presetBasic',    ratio:[50,20,30] },
  { key:'presetCustom',   ratio:null       }
];

let activeIndex=0;

function renderPresets(){
  const box=document.getElementById('presets');
  box.innerHTML=PRESET_DEFS.map((p,i)=>`
    <div class="preset${i===activeIndex?' active':''}" data-i="${i}">
      <div class="pname">${T(p.key)}</div>
      <div class="pratio">${p.ratio?p.ratio.join(':'):T('setOwn')}</div>
    </div>`).join('');
  box.querySelectorAll('.preset').forEach(el=>{
    el.onclick=()=>{ activeIndex=parseInt(el.dataset.i,10); renderPresets(); toggleCustom(); calc(); };
  });
}
function toggleCustom(){
  document.getElementById('customBox').classList.toggle('show', PRESET_DEFS[activeIndex].ratio===null);
}

function parseTotal(raw){
  raw=(raw||'').trim().toLowerCase().replace(/,/g,'');
  if(!raw) return 0;
  const m=raw.match(/^([\d.]+)\s*(k|m)?$/);
  if(!m) return 0;
  let n=parseFloat(m[1]);
  if(m[2]==='k') n*=1000;
  if(m[2]==='m') n*=1000000;
  return Math.max(0,Math.round(n));
}
function fmtNum(n){ return n.toLocaleString(PhxI18N.getLang()); }

function getRatio(){
  if(PRESET_DEFS[activeIndex].ratio) return PRESET_DEFS[activeIndex].ratio;
  const c1=parseFloat(document.getElementById('c1').value)||0;
  const c2=parseFloat(document.getElementById('c2').value)||0;
  const c3=parseFloat(document.getElementById('c3').value)||0;
  return [c1,c2,c3];
}

function calc(){
  const total=parseTotal(document.getElementById('totalInput').value);
  const ratio=getRatio();
  const sum=ratio.reduce((a,b)=>a+b,0);
  const resBox=document.getElementById('results');
  const checkBox=document.getElementById('totalCheck');

  if(total<=0 || sum<=0){
    resBox.innerHTML='';
    checkBox.textContent='';
    return;
  }

  // Compute proportional amounts, then fix rounding so they sum exactly to total
  // (largest remainder method — the biggest fractional part gets the extra unit).
  const raw=ratio.map(r=>total*r/sum);
  const floors=raw.map(Math.floor);
  let remainder=total-floors.reduce((a,b)=>a+b,0);
  const order=raw.map((v,i)=>({i,frac:v-floors[i]})).sort((a,b)=>b.frac-a.frac);
  const amounts=floors.slice();
  for(let k=0;k<remainder;k++){ amounts[order[k%order.length].i]++; }

  resBox.innerHTML=TYPE_KEYS.map((tk,i)=>`
    <div class="res-row">
      <div class="res-dot" style="background:${COLORS[i]};"></div>
      <div class="res-info">
        <div class="res-name">${T(tk)}</div>
        <div class="res-pct">${sum?Math.round(ratio[i]/sum*100):0}%</div>
      </div>
      <div class="res-amount">${fmtNum(amounts[i])}</div>
    </div>`).join('');

  const checkSum=amounts.reduce((a,b)=>a+b,0);
  checkBox.innerHTML=T('totalCheck').replace('{n}','<b>'+fmtNum(checkSum)+'</b>');
}

document.getElementById('totalInput').addEventListener('input',calc);
['c1','c2','c3'].forEach(id=>document.getElementById(id).addEventListener('input',calc));

PhxI18N.init(DICT, ()=>{ renderPresets(); toggleCustom(); calc(); });
</script>
</body>
</html>
