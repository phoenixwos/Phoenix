<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--text:#eaf3f9;--text-dim:#86a0b7;--fire:#ff7a2e;--good:#22c55e;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:16px 10px 60px;}
  h1{font-family:'Rajdhani',sans-serif;font-size:1.3rem;margin:0 0 4px;}
  .wrap{max-width:640px;margin:0 auto;}
  header{text-align:center;margin-bottom:12px;}
  .eyebrow{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ice-dim);}
  p.sub{font-size:.8rem;color:var(--text-dim);margin:2px 0 0;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .back{display:inline-block;color:var(--ice-dim);text-decoration:none;font-size:.8rem;}
  #bannerBox{display:none;}
  .evCard{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .evHead{display:flex;align-items:center;gap:8px;}
  .evIcon{font-size:1.15rem;}
  .evName{font-weight:700;font-size:.92rem;flex:1;}
  .evCadence{font-size:.68rem;color:var(--text-dim);}
  .toggle{position:relative;width:38px;height:22px;flex:none;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggleSlider{position:absolute;inset:0;background:var(--line);border-radius:999px;cursor:pointer;transition:.2s;}
  .toggleSlider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .toggle input:checked + .toggleSlider{background:var(--fire);}
  .toggle input:checked + .toggleSlider:before{transform:translateX(16px);}

  .legionRow{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .utcLive{font-size:.68rem;color:var(--text-dim);white-space:nowrap;flex:none;width:100%;margin-top:2px;}
  .playerSchedule{margin-top:8px;}
  .scheduleRow{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:3px 0;font-size:.8rem;}
  .scheduleRow .legionLabel{width:auto;color:var(--ice-dim);font-weight:700;}
  .schedTime{color:var(--text);font-weight:600;text-align:right;}
  .utcHint{color:var(--text-dim);font-weight:400;font-size:.72rem;}
  .legionLabel{min-width:64px;flex:none;font-size:.76rem;color:var(--ice-dim);font-weight:700;}
  .autoTag{font-size:.62rem;color:var(--good);font-weight:600;text-transform:uppercase;}
  .dtInput{flex:1;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:7px 9px;border-radius:8px;font-size:.78rem;font-family:inherit;}
  .dtDate{flex:1;min-width:110px;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:6px 7px;border-radius:8px;font-size:.76rem;font-family:inherit;}
  .dtHour,.dtMin{background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:6px 4px;border-radius:8px;font-size:.76rem;font-family:inherit;flex:none;}
  .stageList{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:.72rem;color:var(--text-dim);}
  .stageList div{padding:2px 0;}
  .savingField{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:.74rem;color:var(--text-dim);}
  .savingField input{width:46px;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:4px 6px;border-radius:6px;font-size:.76rem;text-align:center;}
  .leaderOnly{display:none;}
  .gate{text-align:center;padding:30px 20px;color:var(--text-dim);font-size:.85rem;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#0d1b2a;
    color:#fff;padding:10px 20px;border-radius:14px;font-weight:600;font-size:.85rem;opacity:0;transition:.25s;z-index:99;border:1px solid var(--line);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .lang-box{position:relative;}
  .lang-btn{display:flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text-dim);font-family:'Inter';font-weight:600;font-size:.74rem;padding:6px 11px;border-radius:13px;cursor:pointer;}
  .lang-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:8px;display:none;grid-template-columns:repeat(2,1fr);gap:2px;width:250px;
    max-height:60vh;overflow-y:auto;box-shadow:0 16px 40px -8px rgba(0,0,0,.5);z-index:60;}
  .lang-menu.open{display:grid;}
  .lang-menu button{background:none;border:none;color:var(--text-dim);text-align:left;font-family:'Inter';
    font-weight:500;font-size:.8rem;padding:8px 9px;border-radius:9px;cursor:pointer;}
  .lang-menu button:hover{background:var(--panel-2);color:var(--text);}
  .lang-menu button.active{color:var(--fire);font-weight:700;}
</style>
</head>

var T=function(k){return PhxI18N.t(k);};

function getState(){var q=new URLSearchParams(location.search).get('s');if(q){try{localStorage.setItem('phx_state',q);}catch(e){}return q;}try{var ls=localStorage.getItem('phx_state');if(ls)return ls;}catch(e){}return '3139';}
var STATE=getState();
(function(){var bl=document.getElementById('backLink');if(bl&&STATE&&STATE!=='3139')bl.href='phoenix-tools.html?s='+STATE;})();
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

var session=null, isLeader=false, occByKey={}, customMsgByKey={}, previewMode=false, copyPasteOptions='', copyPasteBodies={};

// Splits an ISO string into the UTC date/hour/minute parts an input needs.
function toUtcParts(iso){
  if(!iso) return {date:'',hour:'0',min:'0'};
  var d=new Date(iso);
  return {
    date: d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'),
    hour: String(d.getUTCHours()),
    min: String(d.getUTCMinutes())
  };
}
// Builds a UTC ISO string from the three raw field values — no timezone math needed
// by whoever is typing, because every field IS the UTC value already.
function utcPartsToIso(dateStr,hourStr,minStr){
  if(!dateStr) return null;
  var parts=dateStr.split('-').map(Number);
  var h=parseInt(hourStr,10)||0, m=parseInt(minStr,10)||0;
  return new Date(Date.UTC(parts[0],parts[1]-1,parts[2],h,m,0)).toISOString();
}
function hourOptions(sel){
  var out=''; for(var h=0;h<24;h++){ var v=String(h); out+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+String(h).padStart(2,'0')+'</option>'; } return out;
}
function minOptions(sel){
  var out=''; [0,15,30,45].forEach(function(m){ var v=String(m); out+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+String(m).padStart(2,'0')+'</option>'; }); return out;
}
// Renders the date + UTC-hour + UTC-minute trio for one occurrence key, plus a
// "= your local time" hint so the leader can sanity-check what they just typed.
function utcInputHTML(key,iso){
  var p=toUtcParts(iso);
  return '<input type="date" class="dtDate" data-occdate="'+key+'" value="'+p.date+'">'+
    '<select class="dtHour" data-occhour="'+key+'">'+hourOptions(p.hour)+'</select>:'+
    '<select class="dtMin" data-occmin="'+key+'">'+minOptions(p.min)+'</select> UTC'+
    '<span class="utcLive" data-utclive="'+key+'">'+(iso?('= '+T('yourTime')+' '+fmtLocal(iso)):'')+'</span>';
}

async function loadData(){
  var occRes=await sb.from('event_occurrences').select('*').eq('state_id',STATE);
  occByKey={};
  (occRes.data||[]).forEach(function(o){ occByKey[o.event_key+'|'+(o.legion||'')]=o; });
  var msgRes=await sb.from('event_custom_messages').select('*').eq('state_id',STATE);
  customMsgByKey={};
  (msgRes.data||[]).forEach(function(m){ customMsgByKey[m.event_key]=m.message; });
}

function cadenceLabel(days){
  if(days==null) return T('cadenceIrregular');
  if(days===1) return T('cadenceDaily');
  if(days===2) return T('cadence2d');
  if(days===7) return T('cadenceWeekly');
  if(days===14) return T('cadence2w');
  if(days===28) return T('cadence4w');
  if(days===30) return T('cadenceMonthly');
  return days+'d';
}

function fmtUTC(iso){
  if(!iso)return '';
  var d=new Date(iso);
  return d.toLocaleString('en-GB',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'UTC'})+' UTC';
}
function fmtLocal(iso){
  if(!iso)return '';
  var d=new Date(iso);
  return d.toLocaleString(PhxI18N.getLang(),{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function render(){
  var lang=PhxI18N.getLang();
  var app=document.getElementById('app');
  app.innerHTML='';
  var showLeaderControls=isLeader && !previewMode;
  PhxAlerts.EVENTS.forEach(function(def){
    var card=document.createElement('div');
    card.className='evCard';
    var displayName = PhxAlerts.eventName(def.key, lang);
    var html='<div class="evHead"><div class="evIcon">'+def.icon+'</div><div><div class="evName">'+displayName+'</div><div class="evCadence">'+cadenceLabel(def.cadenceDays)+'</div></div></div>';

    // ── Always-visible read-only schedule (this is the "calendar" every player sees) ──
    html+='<div class="playerSchedule">';
    var rowsForDisplay = def.instances ? def.instances.map(function(lbl,i){return {label:lbl,leg:'legion'+(i+1)};}) : [{label:T('next'),leg:''}];
    rowsForDisplay.forEach(function(r){
      var occ=occByKey[def.key+'|'+r.leg];
      if(!occ){ html+='<div class="scheduleRow"><span class="legionLabel">'+r.label+'</span><span class="schedTime" style="opacity:.5;">—</span></div>'; return; }
      var rolled=PhxAlerts.nextOccurrence(occ.occurs_at, def.cadenceDays);
      html+='<div class="scheduleRow"><span class="legionLabel">'+r.label+'</span><span class="schedTime">'+fmtLocal(rolled)+' <span class="utcHint">('+fmtUTC(rolled)+')</span></span></div>';
    });
    html+='</div>';

    // ── Leader-only editing controls ──
    html+='<div class="leaderOnly" data-leader="1" style="'+(showLeaderControls?'':'display:none;')+'">';
    if(def.instances){
      def.instances.forEach(function(instLabel,i){
        var leg='legion'+(i+1);
        var occ=occByKey[def.key+'|'+leg];
        var displayIso=occ?PhxAlerts.nextOccurrence(occ.occurs_at, def.cadenceDays).toISOString():'';
        var autoTag=(occ && def.cadenceDays!=null)?' <span class="autoTag">'+T('auto')+'</span>':'';
        html+='<div class="legionRow"><div class="legionLabel">'+instLabel+autoTag+'</div>'+utcInputHTML(def.key+'|'+leg,displayIso)+'</div>';
      });
    }else{
      var occ0=occByKey[def.key+'|'];
      var displayIso0=occ0?PhxAlerts.nextOccurrence(occ0.occurs_at, def.cadenceDays).toISOString():'';
      var autoTag0=(occ0 && def.cadenceDays!=null)?' <span class="autoTag">'+T('auto')+'</span>':'';
      html+='<div class="legionRow"><div class="legionLabel">'+T('next')+autoTag0+'</div>'+utcInputHTML(def.key+'|',displayIso0)+'</div>';
      if(def.key==='svs'){
        var savingDays=(occ0&&occ0.saving_days)||PhxAlerts.DEFAULT_SVS_SAVING_DAYS;
        html+='<div class="savingField">'+T('startSaving')+' <input type="number" min="7" max="28" id="svsSavingDays" value="'+savingDays+'"> '+T('daysBeforeWord')+'</div>';
      }
    }
    var noteVal=(customMsgByKey[def.key]||'').replace(/</g,'&lt;');
    html+='<div style="display:flex;gap:6px;align-items:center;margin-top:6px;">'+
      '<select class="cpPicker" data-cp="'+def.key+'" style="flex:none;background:var(--bg-deep);border:1px solid var(--line);color:var(--text-dim);padding:6px;border-radius:8px;font-size:.72rem;max-width:90px;"><option value="">'+T('cpPickerLabel')+'</option>'+
        copyPasteOptions+'</select>'+
      '<textarea class="noteInput" data-note="'+def.key+'" placeholder="'+T('customMsgPh')+'" rows="2" style="flex:1;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);padding:8px 9px;border-radius:8px;font-size:.78rem;font-family:inherit;resize:vertical;">'+noteVal+'</textarea>'+
    '</div>';
    html+='</div>';

    html+='<div class="stageList">'+def.stages.map(function(s){
      var tag;
      if(s.offset==='saving') tag='';
      else if(s.offsetMin!=null) tag=' ('+Math.abs(s.offsetMin)+' min '+(s.offsetMin<0?T('daysBeforeWord').split(' ')[0]||'before':'')+')';
      else if(s.offset===0) tag=' '+T('dayOf');
      else tag=' '+T('daysBeforeTag').replace('{n}',Math.abs(s.offset));
      return '<div>• '+s.label+tag+'</div>';
    }).join('')+'</div>';

    card.innerHTML=html;
    (function(){
      var keys={};
      card.querySelectorAll('[data-occdate],[data-occhour],[data-occmin]').forEach(function(el){
        var k=el.dataset.occdate||el.dataset.occhour||el.dataset.occmin;
        keys[k]=true;
      });
      Object.keys(keys).forEach(function(key){
        var dEl=card.querySelector('[data-occdate="'+key+'"]');
        var hEl=card.querySelector('[data-occhour="'+key+'"]');
        var mEl=card.querySelector('[data-occmin="'+key+'"]');
        var hint=card.querySelector('[data-utclive="'+key+'"]');
        function refreshHintAndSave(){
          if(!dEl.value){ if(hint)hint.textContent=''; return; }
          var iso=utcPartsToIso(dEl.value,hEl.value,mEl.value);
          if(hint) hint.textContent='= '+T('yourTime')+' '+fmtLocal(iso);
          saveOccurrence(key, iso);
        }
        [dEl,hEl,mEl].forEach(function(el){ el.addEventListener('change', refreshHintAndSave); });
      });
    })();
    var noteEl=card.querySelector('[data-note]');
    if(noteEl) noteEl.addEventListener('change',function(){ saveCustomMessage(def.key, noteEl.value); });
    var cpEl=card.querySelector('[data-cp]');
    if(cpEl) cpEl.addEventListener('change',function(){
      if(!cpEl.value)return;
      var body=copyPasteBodies[cpEl.value]||'';
      if(noteEl){ noteEl.value=body; saveCustomMessage(def.key, body); }
      cpEl.value='';
    });
    if(def.key==='svs'){
      var sdInp=card.querySelector('#svsSavingDays');
      if(sdInp) sdInp.addEventListener('change',function(){ saveSvsSavingDays(sdInp.value); });
    }
    app.appendChild(card);
  });
  document.querySelectorAll('[data-leader]').forEach(function(el){ el.style.display=(isLeader&&!previewMode)?'block':'none'; });
}

async function saveCustomMessage(eventKey, text){
  if(!isLeader){ toast(T('leadersOnly')); return; }
  customMsgByKey[eventKey]=text;
  await sb.from('event_custom_messages').upsert({
    state_id:STATE, event_key:eventKey, message:text||null, updated_by:session?session.user.id:null, updated_at:new Date().toISOString()
  },{onConflict:'state_id,event_key'});
  toast(T('saved'));
}

async function saveOccurrence(compositeKey, isoValue){
  if(!isLeader){ toast(T('leadersOnly')); return; }
  var parts=compositeKey.split('|');
  var eventKey=parts[0], legion=parts[1]||null;
  if(!isoValue){ return; }
  await sb.from('event_occurrences').upsert({
    state_id:STATE, event_key:eventKey, legion:legion, occurs_at:isoValue, updated_at:new Date().toISOString()
  },{onConflict:'state_id,event_key,legion'});
  toast(T('saved'));
  await loadData();
}

async function saveSvsSavingDays(val){
  if(!isLeader) return;
  var occ=occByKey['svs|'];
  var iso=occ?occ.occurs_at:new Date().toISOString();
  await sb.from('event_occurrences').upsert({
    state_id:STATE, event_key:'svs', legion:null, occurs_at:iso, saving_days:parseInt(val,10)||PhxAlerts.DEFAULT_SVS_SAVING_DAYS, updated_at:new Date().toISOString()
  },{onConflict:'state_id,event_key,legion'});
  toast(T('saved'));
}

var myAllianceId=null, myAllianceTag=null, isAdmin=false, stateAlliances=[], selectedAllianceId=null;
var myPlayerAllianceId=null, myPlayerName='', shieldActive=false, shieldActivatedAt=null;

async function loadDiscordWebhook(allianceId){
  if(!allianceId) return '';
  var{data}=await sb.from('alliance_discord_webhooks').select('webhook_url').eq('alliance_id',allianceId).maybeSingle();
  return data?data.webhook_url:'';
}

// ── Shield reminder: personal, any player, posts to their alliance's Discord hourly ──
async function loadShieldState(){
  if(!session)return;
  var{data}=await sb.from('shield_reminders').select('*').eq('owner',session.user.id).maybeSingle();
  shieldActive=data?data.active:false;
  shieldActivatedAt=data?data.activated_at:null;
}

async function renderShieldBox(){
  var box=document.getElementById('shieldBox');
  if(!session || !myPlayerAllianceId){ box.style.display='none'; return; }
  await loadShieldState();
  renderShieldBoxFromState();
}

function renderShieldBoxFromState(){
  var box=document.getElementById('shieldBox');
  if(!session || !myPlayerAllianceId){ box.style.display='none'; return; }
  box.style.display='block';
  var sinceTxt=shieldActive&&shieldActivatedAt?(' — '+T('shieldSince')+' '+new Date(shieldActivatedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})):'';
  box.innerHTML='<div class="evCard">'+
    '<div class="evHead"><div class="evIcon">🛡️</div><div class="evName">'+T('shieldTitle')+'</div></div>'+
    '<p style="font-size:.76rem;color:var(--text-dim);margin:8px 0;">'+T('shieldHelp')+'</p>'+
    '<button class="btn" id="shieldToggleBtn" style="width:100%;'+(shieldActive?'background:linear-gradient(90deg,var(--fire),#ffb938);border:none;color:#08131f;font-weight:800;':'')+'">'+
      (shieldActive?('✅ '+T('shieldOn')+sinceTxt):T('shieldActivate'))+
    '</button>'+
  '</div>';
  document.getElementById('shieldToggleBtn').addEventListener('click',toggleShield);
}

async function toggleShield(){
  if(!session)return;
  var btn=document.getElementById('shieldToggleBtn');
  btn.disabled=true;
  if(shieldActive){
    await sb.from('shield_reminders').update({status:'ending'}).eq('owner',session.user.id);
    shieldActive=false;
    toast(T('shieldOff'));
  }else{
    var nowIso=new Date().toISOString();
    await sb.from('shield_reminders').upsert({
      owner:session.user.id, state_id:STATE, alliance_id:myPlayerAllianceId, player_name:myPlayerName,
      active:true, status:'starting', activated_at:nowIso, updated_at:nowIso
    },{onConflict:'owner'});
    shieldActive=true; shieldActivatedAt=nowIso;
    toast(T('shieldOn'));
  }
  btn.disabled=false;
  renderShieldBoxFromState();
}

async function renderDiscordBox(){
  var box=document.getElementById('discordBox');
  if(!isLeader || previewMode || (!myAllianceId && !isAdmin)){ box.style.display='none'; return; }
  box.style.display='block';

  var allianceSelectorHtml='';
  if(isAdmin){
    if(!selectedAllianceId && stateAlliances.length) selectedAllianceId=stateAlliances[0].id;
    allianceSelectorHtml='<select id="discordAllianceSelect" style="width:100%;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);padding:8px 9px;border-radius:8px;font-size:.8rem;font-family:inherit;margin-bottom:8px;">'+
      stateAlliances.map(function(a){return '<option value="'+a.id+'"'+(a.id===selectedAllianceId?' selected':'')+'>['+a.tag+'] '+(a.name||'')+'</option>';}).join('')+
      '</select>';
  }else{
    selectedAllianceId=myAllianceId;
  }

  var current=await loadDiscordWebhook(selectedAllianceId);
  var tagLabel=isAdmin?'':(' — ['+(myAllianceTag||'')+']');
  box.innerHTML=
    '<div class="evCard">'+
      '<div class="evHead"><div class="evIcon">💬</div><div class="evName">'+T('discordTitle')+tagLabel+'</div></div>'+
      allianceSelectorHtml+
      '<p style="font-size:.76rem;color:var(--text-dim);margin:8px 0;">'+T('discordHelp')+'</p>'+
      '<input type="url" id="discordUrlInput" placeholder="https://discord.com/api/webhooks/…" value="'+(current||'').replace(/"/g,'&quot;')+'" style="width:100%;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);padding:9px 11px;border-radius:9px;font-size:.8rem;font-family:inherit;margin-bottom:8px;">'+
      '<button class="btn fire" id="saveDiscordBtn" style="width:100%;">'+T('discordSave')+'</button>'+
    '</div>';
  document.getElementById('saveDiscordBtn').addEventListener('click',saveDiscordWebhook);
  var sel=document.getElementById('discordAllianceSelect');
  if(sel) sel.addEventListener('change',function(){ selectedAllianceId=sel.value; renderDiscordBox(); });
}

async function saveDiscordWebhook(){
  var val=document.getElementById('discordUrlInput').value.trim();
  var targetAllianceId=isAdmin?selectedAllianceId:myAllianceId;
  var btn=document.getElementById('saveDiscordBtn');
  btn.disabled=true;
  if(!val){
    await sb.from('alliance_discord_webhooks').delete().eq('alliance_id',targetAllianceId);
  }else{
    await sb.from('alliance_discord_webhooks').upsert({
      alliance_id:targetAllianceId, webhook_url:val, updated_by:session.user.id, updated_at:new Date().toISOString()
    },{onConflict:'alliance_id'});
  }
  btn.disabled=false;
  toast(T('saved'));
}

async function init(){
  PhxI18N.init(DICT, function(){ render(); renderDiscordBox(); renderShieldBox(); renderFacilityBox(); });
  // In-app banner disabled — alerts now go to Discord only.
  var{data:{session:s}}=await sb.auth.getSession();
  session=s;
  if(session){
    var{data:allRows}=await sb.from('players').select('role,state_id,alliance_id,name').eq('owner',session.user.id);
    allRows=allRows||[];
    isAdmin=allRows.some(function(p){return p.role==='admin';}); // admin is global, not tied to one state's profile
    var rowsThisState=allRows.filter(function(p){return p.state_id===STATE;});
    isLeader=isAdmin||rowsThisState.some(function(p){return p.role==='r4'||p.role==='r5';});
    var leaderRow=rowsThisState.find(function(p){return (p.role==='r4'||p.role==='r5')&&p.alliance_id;});
    if(leaderRow){
      myAllianceId=leaderRow.alliance_id;
      var{data:al}=await sb.from('alliances').select('tag').eq('id',myAllianceId).maybeSingle();
      myAllianceTag=al?al.tag:'';
    }
    // Any player (not just leaders) needs their own alliance for the shield reminder.
    var anyRow=rowsThisState.find(function(p){return p.alliance_id;});
    if(anyRow){ myPlayerAllianceId=anyRow.alliance_id; myPlayerName=anyRow.name||''; }
    if(isAdmin){
      var{data:als}=await sb.from('alliances').select('id,tag,name').eq('state_id',STATE).order('tag');
      stateAlliances=als||[];
    }
    if(isLeader){
      var{data:cps}=await sb.from('copy_pastes').select('id,category,title,body').order('category').order('sort_order');
      copyPasteBodies={};
      copyPasteOptions=(cps||[]).map(function(m){
        copyPasteBodies[m.id]=m.body;
        return '<option value="'+m.id+'">'+(m.category?'['+m.category+'] ':'')+(m.title||'').replace(/</g,'&lt;')+'</option>';
      }).join('');
      var pvBtn=document.getElementById('previewToggleBtn');
      pvBtn.style.display='inline-block';
      pvBtn.textContent='👁️ '+T('previewOn');
      pvBtn.onclick=function(){
        previewMode=!previewMode;
        pvBtn.textContent=previewMode?('✏️ '+T('previewOff')):('👁️ '+T('previewOn'));
        render(); renderDiscordBox(); renderFacilityBox();
      };
    }
  }
  await loadData();
  render();
  await renderDiscordBox();
  await renderFacilityBox();
  await renderShieldBox();
}
// ── Facility rally alerts (Fort/Stronghold…) — one-off, 5 min before ──
var facilityAlerts=[];
async function loadFacilityAlerts(){
  var{data}=await sb.from('facility_alerts').select('*').eq('state_id',STATE).eq('sent',false).order('scheduled_at');
  facilityAlerts=data||[];
}
async function renderFacilityBox(){
  var box=document.getElementById('facilityBox');
  if(!isLeader || previewMode){ box.style.display='none'; return; }
  box.style.display='block';
  await loadFacilityAlerts();
  var listHtml=facilityAlerts.length?facilityAlerts.map(function(f){
    return '<div class="legionRow"><div style="flex:1;"><b>'+(f.facility_name||'').replace(/</g,'&lt;')+'</b><br><span class="utcHint">'+fmtLocal(f.scheduled_at)+' ('+fmtUTC(f.scheduled_at)+')</span>'+(f.note?'<br><span style="font-size:.74rem;color:var(--text-dim);">📝 '+f.note.replace(/</g,'&lt;')+'</span>':'')+'</div><button class="del-btn" data-fadel="'+f.id+'" style="background:none;border:none;color:var(--bad);font-size:.9rem;cursor:pointer;">✕</button></div>';
  }).join(''):'<p style="font-size:.8rem;color:var(--text-dim);">'+T('facilityNone')+'</p>';
  box.innerHTML='<div class="evCard">'+
    '<div class="evHead"><div class="evIcon">🏰</div><div class="evName">'+T('facilityTitle')+'</div></div>'+
    '<p style="font-size:.76rem;color:var(--text-dim);margin:8px 0;">'+T('facilityHelp')+'</p>'+
    '<div id="facilityList" style="margin-bottom:10px;">'+listHtml+'</div>'+
    '<input type="text" id="facNameInput" placeholder="'+T('facilityNamePh')+'" style="width:100%;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);padding:8px 9px;border-radius:8px;font-size:.8rem;font-family:inherit;margin-bottom:6px;">'+
    '<div class="legionRow" style="margin-top:0;">'+utcInputHTML('newfac','')+'</div>'+
    '<textarea id="facNoteInput" rows="2" placeholder="'+T('facilityNotePh')+'" style="width:100%;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);padding:8px 9px;border-radius:8px;font-size:.8rem;font-family:inherit;margin:8px 0;resize:vertical;"></textarea>'+
    '<button class="btn fire" id="facAddBtn" style="width:100%;">'+T('facilityAdd')+'</button>'+
  '</div>';
  var facHint=box.querySelector('[data-utclive="newfac"]');
  ['newfac'].forEach(function(key){
    var dEl=box.querySelector('[data-occdate="'+key+'"]');
    var hEl=box.querySelector('[data-occhour="'+key+'"]');
    var mEl=box.querySelector('[data-occmin="'+key+'"]');
    [dEl,hEl,mEl].forEach(function(el){ el.addEventListener('change',function(){
      if(!dEl.value){ facHint.textContent=''; return; }
      var iso=utcPartsToIso(dEl.value,hEl.value,mEl.value);
      facHint.textContent='= '+T('yourTime')+' '+fmtLocal(iso);
    }); });
  });
  document.getElementById('facAddBtn').addEventListener('click',addFacilityAlert);
  document.querySelectorAll('[data-fadel]').forEach(function(b){
    b.addEventListener('click',function(){ deleteFacilityAlert(b.dataset.fadel); });
  });
}
async function addFacilityAlert(){
  var name=document.getElementById('facNameInput').value.trim();
  var dEl=document.querySelector('[data-occdate="newfac"]');
  var hEl=document.querySelector('[data-occhour="newfac"]');
  var mEl=document.querySelector('[data-occmin="newfac"]');
  var note=document.getElementById('facNoteInput').value.trim();
  if(!name||!dEl.value){ toast(T('facilityNeedBoth')); return; }
  var iso=utcPartsToIso(dEl.value,hEl.value,mEl.value);
  var btn=document.getElementById('facAddBtn'); btn.disabled=true;
  var{error}=await sb.from('facility_alerts').insert({state_id:STATE,facility_name:name,scheduled_at:iso,note:note||null,created_by:session?session.user.id:null});
  btn.disabled=false;
  if(error){ toast('Error: '+error.message); return; }
  toast(T('saved'));
  await renderFacilityBox();
}
async function deleteFacilityAlert(id){
  if(!window.confirm(T('facilityDeleteConfirm')))return;
  await sb.from('facility_alerts').delete().eq('id',id);
  toast(T('saved'));
  await renderFacilityBox();
}

init();
</script>
