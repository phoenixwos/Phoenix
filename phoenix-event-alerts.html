<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--text:#eaf3f9;--text-dim:#86a0b7;--fire:#ff7a2e;--good:#22c55e;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:16px 10px 60px;}
  h1{font-family:'Rajdhani',sans-serif;font-size:1.3rem;margin:0 0 4px;}
  .wrap{max-width:640px;margin:0 auto;}
  header{text-align:center;margin-bottom:12px;}
  .eyebrow{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ice-dim);}
  p.sub{font-size:.8rem;color:var(--text-dim);margin:2px 0 0;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .back{display:inline-block;color:var(--ice-dim);text-decoration:none;font-size:.8rem;}
  #bannerBox{display:none;}
  .evCard{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .evHead{display:flex;align-items:center;gap:8px;}
  .evIcon{font-size:1.15rem;}
  .evName{font-weight:700;font-size:.92rem;flex:1;}
  .evCadence{font-size:.68rem;color:var(--text-dim);}
  .toggle{position:relative;width:38px;height:22px;flex:none;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggleSlider{position:absolute;inset:0;background:var(--line);border-radius:999px;cursor:pointer;transition:.2s;}
  .toggleSlider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .toggle input:checked + .toggleSlider{background:var(--fire);}
  .toggle input:checked + .toggleSlider:before{transform:translateX(16px);}

  .legionRow{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .legionLabel{min-width:64px;flex:none;font-size:.76rem;color:var(--ice-dim);font-weight:700;}
  .autoTag{font-size:.62rem;color:var(--good);font-weight:600;text-transform:uppercase;}
  .dtInput{flex:1;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:7px 9px;border-radius:8px;font-size:.78rem;font-family:inherit;}
  .stageList{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:.72rem;color:var(--text-dim);}
  .stageList div{padding:2px 0;}
  .savingField{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:.74rem;color:var(--text-dim);}
  .savingField input{width:46px;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:4px 6px;border-radius:6px;font-size:.76rem;text-align:center;}
  .leaderOnly{display:none;}
  .gate{text-align:center;padding:30px 20px;color:var(--text-dim);font-size:.85rem;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#0d1b2a;
    color:#fff;padding:10px 20px;border-radius:14px;font-weight:600;font-size:.85rem;opacity:0;transition:.25s;z-index:99;border:1px solid var(--line);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .lang-box{position:relative;}
  .lang-btn{display:flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text-dim);font-family:'Inter';font-weight:600;font-size:.74rem;padding:6px 11px;border-radius:13px;cursor:pointer;}
  .lang-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:8px;display:none;grid-template-columns:repeat(2,1fr);gap:2px;width:250px;
    max-height:60vh;overflow-y:auto;box-shadow:0 16px 40px -8px rgba(0,0,0,.5);z-index:60;}
  .lang-menu.open{display:grid;}
  .lang-menu button{background:none;border:none;color:var(--text-dim);text-align:left;font-family:'Inter';
    font-weight:500;font-size:.8rem;padding:8px 9px;border-radius:9px;cursor:pointer;}
  .lang-menu button:hover{background:var(--panel-2);color:var(--text);}
  .lang-menu button.active{color:var(--fire);font-weight:700;}
</style>
</head>

var T=function(k){return PhxI18N.t(k);};

function getState(){var q=new URLSearchParams(location.search).get('s');if(q){try{localStorage.setItem('phx_state',q);}catch(e){}return q;}try{var ls=localStorage.getItem('phx_state');if(ls)return ls;}catch(e){}return '3139';}
var STATE=getState();
(function(){var bl=document.getElementById('backLink');if(bl&&STATE&&STATE!=='3139')bl.href='phoenix-tools.html?s='+STATE;})();
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

var session=null, isLeader=false, occByKey={}, prefsByKey={};

function toLocalInputValue(iso){
  if(!iso) return '';
  var d=new Date(iso);
  var tz=d.getTimezoneOffset()*60000;
  return new Date(d-tz).toISOString().slice(0,16);
}

async function loadData(){
  var occRes=await sb.from('event_occurrences').select('*').eq('state_id',STATE);
  occByKey={};
  (occRes.data||[]).forEach(function(o){ occByKey[o.event_key+'|'+(o.legion||'')]=o; });
  if(session){
    var prefRes=await sb.from('event_alert_prefs').select('*').eq('owner',session.user.id).eq('state_id',STATE);
    prefsByKey={};
    (prefRes.data||[]).forEach(function(p){ prefsByKey[p.event_key]=p.enabled; });
  }
}

function cadenceLabel(days){
  if(days==null) return T('cadenceIrregular');
  if(days===1) return T('cadenceDaily');
  if(days===2) return T('cadence2d');
  if(days===7) return T('cadenceWeekly');
  if(days===14) return T('cadence2w');
  if(days===28) return T('cadence4w');
  if(days===30) return T('cadenceMonthly');
  return days+'d';
}

function render(){
  var lang=PhxI18N.getLang();
  var app=document.getElementById('app');
  app.innerHTML='';
  PhxAlerts.EVENTS.forEach(function(def){
    var card=document.createElement('div');
    card.className='evCard';
    var enabled = prefsByKey[def.key]!==false; // default true
    var displayName = PhxAlerts.eventName(def.key, lang);
    var html='<div class="evHead"><div class="evIcon">'+def.icon+'</div><div><div class="evName">'+displayName+'</div><div class="evCadence">'+cadenceLabel(def.cadenceDays)+'</div></div>';
    html+='<label class="toggle"><input type="checkbox" data-toggle="'+def.key+'" '+(enabled?'checked':'')+'><span class="toggleSlider"></span></label></div>';

    html+='<div class="leaderOnly" data-leader="1">';
    if(def.instances){
      def.instances.forEach(function(instLabel,i){
        var leg='legion'+(i+1);
        var occ=occByKey[def.key+'|'+leg];
        var displayIso=occ?PhxAlerts.nextOccurrence(occ.occurs_at, def.cadenceDays).toISOString():'';
        var autoTag=(occ && def.cadenceDays!=null)?' <span class="autoTag">'+T('auto')+'</span>':'';
        html+='<div class="legionRow"><div class="legionLabel">'+instLabel+autoTag+'</div><input type="datetime-local" class="dtInput" data-occ="'+def.key+'|'+leg+'" value="'+toLocalInputValue(displayIso)+'"></div>';
      });
    }else{
      var occ0=occByKey[def.key+'|'];
      var displayIso0=occ0?PhxAlerts.nextOccurrence(occ0.occurs_at, def.cadenceDays).toISOString():'';
      var autoTag0=(occ0 && def.cadenceDays!=null)?' <span class="autoTag">'+T('auto')+'</span>':'';
      html+='<div class="legionRow"><div class="legionLabel">'+T('next')+autoTag0+'</div><input type="datetime-local" class="dtInput" data-occ="'+def.key+'|" value="'+toLocalInputValue(displayIso0)+'"></div>';
      if(def.key==='svs'){
        var savingDays=(occ0&&occ0.saving_days)||PhxAlerts.DEFAULT_SVS_SAVING_DAYS;
        html+='<div class="savingField">'+T('startSaving')+' <input type="number" min="7" max="28" id="svsSavingDays" value="'+savingDays+'"> '+T('daysBeforeWord')+'</div>';
      }
    }
    html+='</div>';

    html+='<div class="stageList">'+def.stages.map(function(s){
      return '<div>• '+s.label+(s.offset==='saving'?'':(s.offset===0?' '+T('dayOf'):(' '+T('daysBeforeTag').replace('{n}',Math.abs(s.offset)))))+'</div>';
    }).join('')+'</div>';

    card.innerHTML=html;
    card.querySelector('[data-toggle]').addEventListener('change',function(e){ saveToggle(def.key, e.target.checked); });
    card.querySelectorAll('[data-occ]').forEach(function(inp){
      inp.addEventListener('change',function(){ saveOccurrence(inp.dataset.occ, inp.value); });
    });
    if(def.key==='svs'){
      var sdInp=card.querySelector('#svsSavingDays');
      if(sdInp) sdInp.addEventListener('change',function(){ saveSvsSavingDays(sdInp.value); });
    }
    app.appendChild(card);
  });
  document.querySelectorAll('[data-leader]').forEach(function(el){ el.style.display=isLeader?'block':'none'; });
}

async function saveToggle(eventKey, checked){
  if(!session){ toast(T('signInFirst')); return; }
  prefsByKey[eventKey]=checked;
  if(checked){
    await sb.from('event_alert_prefs').delete().eq('owner',session.user.id).eq('state_id',STATE).eq('event_key',eventKey);
  }else{
    await sb.from('event_alert_prefs').upsert({owner:session.user.id, state_id:STATE, event_key:eventKey, enabled:false, updated_at:new Date().toISOString()},{onConflict:'owner,state_id,event_key'});
  }
  toast(checked?T('alertsOn'):T('alertsOff'));
}

async function saveOccurrence(compositeKey, localValue){
  if(!isLeader){ toast(T('leadersOnly')); return; }
  var parts=compositeKey.split('|');
  var eventKey=parts[0], legion=parts[1]||null;
  if(!localValue){ return; }
  var iso=new Date(localValue).toISOString();
  await sb.from('event_occurrences').upsert({
    state_id:STATE, event_key:eventKey, legion:legion, occurs_at:iso, updated_at:new Date().toISOString()
  },{onConflict:'state_id,event_key,legion'});
  toast(T('saved'));
  await loadData();
}

async function saveSvsSavingDays(val){
  if(!isLeader) return;
  var occ=occByKey['svs|'];
  var iso=occ?occ.occurs_at:new Date().toISOString();
  await sb.from('event_occurrences').upsert({
    state_id:STATE, event_key:'svs', legion:null, occurs_at:iso, saving_days:parseInt(val,10)||PhxAlerts.DEFAULT_SVS_SAVING_DAYS, updated_at:new Date().toISOString()
  },{onConflict:'state_id,event_key,legion'});
  toast(T('saved'));
}

var myAllianceId=null, myAllianceTag=null, isAdmin=false, stateAlliances=[], selectedAllianceId=null;

async function loadDiscordWebhook(allianceId){
  if(!allianceId) return '';
  var{data}=await sb.from('alliance_discord_webhooks').select('webhook_url').eq('alliance_id',allianceId).maybeSingle();
  return data?data.webhook_url:'';
}

async function renderDiscordBox(){
  var box=document.getElementById('discordBox');
  if(!isLeader || (!myAllianceId && !isAdmin)){ box.style.display='none'; return; }
  box.style.display='block';

  var allianceSelectorHtml='';
  if(isAdmin){
    if(!selectedAllianceId && stateAlliances.length) selectedAllianceId=stateAlliances[0].id;
    allianceSelectorHtml='<select id="discordAllianceSelect" style="width:100%;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);padding:8px 9px;border-radius:8px;font-size:.8rem;font-family:inherit;margin-bottom:8px;">'+
      stateAlliances.map(function(a){return '<option value="'+a.id+'"'+(a.id===selectedAllianceId?' selected':'')+'>['+a.tag+'] '+(a.name||'')+'</option>';}).join('')+
      '</select>';
  }else{
    selectedAllianceId=myAllianceId;
  }

  var current=await loadDiscordWebhook(selectedAllianceId);
  var tagLabel=isAdmin?'':(' — ['+(myAllianceTag||'')+']');
  box.innerHTML=
    '<div class="evCard">'+
      '<div class="evHead"><div class="evIcon">💬</div><div class="evName">'+T('discordTitle')+tagLabel+'</div></div>'+
      allianceSelectorHtml+
      '<p style="font-size:.76rem;color:var(--text-dim);margin:8px 0;">'+T('discordHelp')+'</p>'+
      '<input type="url" id="discordUrlInput" placeholder="https://discord.com/api/webhooks/…" value="'+(current||'').replace(/"/g,'&quot;')+'" style="width:100%;background:var(--bg-deep);border:1px solid var(--line);color:var(--text);padding:9px 11px;border-radius:9px;font-size:.8rem;font-family:inherit;margin-bottom:8px;">'+
      '<button class="btn fire" id="saveDiscordBtn" style="width:100%;">'+T('discordSave')+'</button>'+
    '</div>';
  document.getElementById('saveDiscordBtn').addEventListener('click',saveDiscordWebhook);
  var sel=document.getElementById('discordAllianceSelect');
  if(sel) sel.addEventListener('change',function(){ selectedAllianceId=sel.value; renderDiscordBox(); });
}

async function saveDiscordWebhook(){
  var val=document.getElementById('discordUrlInput').value.trim();
  var targetAllianceId=isAdmin?selectedAllianceId:myAllianceId;
  var btn=document.getElementById('saveDiscordBtn');
  btn.disabled=true;
  if(!val){
    await sb.from('alliance_discord_webhooks').delete().eq('alliance_id',targetAllianceId);
  }else{
    await sb.from('alliance_discord_webhooks').upsert({
      alliance_id:targetAllianceId, webhook_url:val, updated_by:session.user.id, updated_at:new Date().toISOString()
    },{onConflict:'alliance_id'});
  }
  btn.disabled=false;
  toast(T('saved'));
}

async function init(){
  PhxI18N.init(DICT, function(){ render(); renderDiscordBox(); });
  PhxAlerts.mountBanner('bannerBox');
  var{data:{session:s}}=await sb.auth.getSession();
  session=s;
  if(session){
    var{data:allRows}=await sb.from('players').select('role,state_id,alliance_id').eq('owner',session.user.id);
    allRows=allRows||[];
    isAdmin=allRows.some(function(p){return p.role==='admin';}); // admin is global, not tied to one state's profile
    var rowsThisState=allRows.filter(function(p){return p.state_id===STATE;});
    isLeader=isAdmin||rowsThisState.some(function(p){return p.role==='r4'||p.role==='r5';});
    var leaderRow=rowsThisState.find(function(p){return (p.role==='r4'||p.role==='r5')&&p.alliance_id;});
    if(leaderRow){
      myAllianceId=leaderRow.alliance_id;
      var{data:al}=await sb.from('alliances').select('tag').eq('id',myAllianceId).maybeSingle();
      myAllianceTag=al?al.tag:'';
    }
    if(isAdmin){
      var{data:als}=await sb.from('alliances').select('id,tag,name').eq('state_id',STATE).order('tag');
      stateAlliances=als||[];
    }
  }
  await loadData();
  render();
  await renderDiscordBox();
}
init();
</script>
</body>
</html>
