<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--text:#eaf3f9;--text-dim:#86a0b7;--fire:#ff7a2e;--bad:#ef4444;--good:#22c55e;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:16px 12px 60px;}
  h1{font-family:'Rajdhani',sans-serif;font-size:1.35rem;margin:0 0 4px;}
  .wrap{max-width:600px;margin:0 auto;}
  header{text-align:center;margin-bottom:12px;}
  .eyebrow{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ice-dim);}
  p.sub{font-size:.8rem;color:var(--text-dim);margin:2px 0 0;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .back{display:inline-block;color:var(--ice-dim);text-decoration:none;font-size:.8rem;}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:14px;}
  .panel-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ice-dim);margin-bottom:10px;font-weight:600;}
  .btn{background:transparent;border:1px solid var(--line);color:var(--text-dim);padding:9px 14px;
    border-radius:9px;font-size:.82rem;font-weight:600;cursor:pointer;}
  .btn.fire{background:linear-gradient(90deg,var(--fire),#ffb938);border:none;color:#08131f;font-weight:800;}
  input,select{background:var(--bg-deep);border:1px solid var(--line);color:var(--text);
    padding:9px 11px;border-radius:9px;font-size:.85rem;width:100%;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:.74rem;color:var(--text-dim);margin-bottom:5px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  .eRow{display:flex;align-items:center;gap:10px;padding:10px 4px;border-top:1px solid var(--line);}
  .eRow:first-child{border-top:none;}
  .eBody{flex:1;min-width:0;}
  .eName{font-size:.87rem;font-weight:700;color:var(--text);}
  .eTime{font-size:.76rem;color:var(--text-dim);}
  .eNext{font-size:.72rem;font-weight:700;color:var(--fire);text-align:right;flex:none;min-width:70px;}
  .eDel{background:none;border:none;color:var(--bad);font-size:.9rem;cursor:pointer;padding:4px 6px;flex:none;}

  .quickRow{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .qbtn{padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg-deep);
    color:var(--text-dim);font-size:.72rem;cursor:pointer;}
  .qbtn.on{border-color:var(--fire);color:var(--fire);}

  .gate{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:.9rem;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0e2718;color:#8ff0b0;
    border:1px solid #1f5a3a;padding:10px 18px;border-radius:10px;font-size:.82rem;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;}
  .toast.show{opacity:1;}

  .lang-box{position:relative;}
  .lang-btn{display:flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text-dim);font-family:'Inter';font-weight:600;font-size:.74rem;padding:6px 11px;border-radius:13px;cursor:pointer;}
  .lang-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:8px;display:none;grid-template-columns:repeat(2,1fr);gap:2px;width:250px;
    max-height:60vh;overflow-y:auto;box-shadow:0 16px 40px -8px rgba(0,0,0,.5);z-index:60;}
  .lang-menu.open{display:grid;}
  .lang-menu button{background:none;border:none;color:var(--text-dim);text-align:left;font-family:'Inter';
    font-weight:500;font-size:.8rem;padding:8px 9px;border-radius:9px;cursor:pointer;}
  .lang-menu button:hover{background:var(--panel-2);color:var(--text);}
  .lang-menu button.active{color:var(--fire);font-weight:700;}
</style>
</head>

function getState(){
  const q=new URLSearchParams(location.search).get('s');
  if(q&&/^\d{3,5}$/.test(q)){ try{localStorage.setItem('phx_state',q);}catch(e){} return q; }
  try{ const ls=localStorage.getItem('phx_state'); if(ls&&/^\d{3,5}$/.test(ls)) return ls; }catch(e){}
  return '3139';
}
const S=getState();
(function(){
  const bl=document.getElementById('backLink');
  if(bl && S && S!=='3139') bl.href='phoenix-tools.html?s='+S;
})();
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
const T=(k)=>PhxI18N.t(k);

// Stored value stays the English preset key so data is consistent across
// every leader's language; only the on-screen label is translated.
const PRESETS=[
  {n:'Fort Sign-up', i:'🏯', key:'presetFortSignup'},
  {n:'Fort Battle', i:'⚔️', key:'presetFortBattle'},
  {n:'Castle Event', i:'🏰', key:'presetCastle'},
  {n:'State vs State (SvS)', i:'🔥', key:'presetSvS'},
  {n:'Canyon Clash', i:'🏞️', key:'presetCanyon'},
  {n:'Foundry Battle', i:'🏭', key:'presetFoundry'},
  {n:'Bear Trap', i:'🐻', key:'presetBearTrap'},
];
function dayName(i){ return T('day'+i); }
function presetLabel(name){
  const p=PRESETS.find(p=>p.n===name);
  return p? (p.i+' '+T(p.key)) : ('📌 '+name);
}

let isLeader=false, events=[];

function nextOccurrence(dow,hour){
  const now=new Date();
  const nowUTCday=now.getUTCDay();
  let diffDays=(dow-nowUTCday+7)%7;
  let target=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+diffDays,hour,0,0));
  if(target<=now) target=new Date(target.getTime()+7*86400000);
  const msLeft=target-now;
  const h=Math.floor(msLeft/3600000), m=Math.floor((msLeft%3600000)/60000);
  if(h<24) return `${h}${T('unitH')} ${m}${T('unitM')}`;
  const d=Math.floor(h/24);
  return `${d}${T('unitD')} ${h%24}${T('unitH')}`;
}

async function loadEvents(){
  const{data}=await sb.from('weekly_events').select('*').eq('state_id',S).order('day_of_week').order('hour_utc');
  events=data||[];
}

function render(){
  const app=document.getElementById('app');
  let html='';
  html+=`<div class="panel"><div class="panel-title">${T('scheduleTitle')}</div><div id="eList"></div></div>`;
  if(isLeader){
    html+=`<div class="panel">
      <div class="panel-title">${T('addEventTitle')}</div>
      <div class="field"><label>${T('eventLabel')}</label>
        <select id="evName">${PRESETS.map(p=>`<option value="${p.n}">${p.i} ${T(p.key)}</option>`).join('')}<option value="__custom">${T('customOption')}</option></select>
      </div>
      <div class="field" id="customWrap" style="display:none;"><label>${T('customLabel')}</label><input id="evCustom" placeholder="${T('customPh')}"></div>
      <div class="row2">
        <div class="field"><label>${T('dayLabel')}</label>
          <select id="evDay">${[0,1,2,3,4,5,6].map(i=>`<option value="${i}">${dayName(i)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>${T('hourLabel')}</label>
          <select id="evHour">${Array.from({length:24},(_,h)=>`<option value="${h}">${String(h).padStart(2,'0')}:00</option>`).join('')}</select>
        </div>
      </div>
      <div class="quickRow" id="hourQuick">
        <div class="qbtn" data-h="13">13:00 UTC</div>
        <div class="qbtn" data-h="14">14:00 UTC</div>
        <div class="qbtn" data-h="17">17:00 UTC</div>
      </div>
      <div class="field" style="margin-top:10px;"><label>${T('noteLabel')}</label><input id="evNote" placeholder="${T('notePh')}"></div>
      <button class="btn fire" id="addBtn" style="width:100%;margin-top:6px;">${T('addBtn')}</button>
    </div>`;
  }
  app.innerHTML=html;
  renderList();
  if(isLeader) wireForm();
}

function renderList(){
  const list=document.getElementById('eList');
  if(!events.length){ list.innerHTML=`<p style="font-size:.82rem;color:var(--text-dim);text-align:center;padding:10px;">${isLeader?T('noEventsLeader'):T('noEventsMember')}</p>`; return; }
  list.innerHTML=events.map(e=>{
    const preset=PRESETS.find(p=>p.n===e.name);
    const icon=preset?preset.i:'📌';
    const label=preset? T(preset.key) : e.name;
    return `<div class="eRow" data-id="${e.id}">
      <div style="font-size:1.1rem;width:22px;text-align:center;">${icon}</div>
      <div class="eBody">
        <div class="eName">${label}</div>
        <div class="eTime">${dayName(e.day_of_week)} · ${String(e.hour_utc).padStart(2,'0')}:00 UTC${e.note?' · '+e.note:''}</div>
      </div>
      <div class="eNext">${nextOccurrence(e.day_of_week,e.hour_utc)}</div>
      ${isLeader?`<button class="eDel" data-del="${e.id}">✕</button>`:''}
    </div>`;
  }).join('');
  if(isLeader){
    list.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!confirm(T('confirmDelete')))return;
      const id=b.dataset.del;
      const{error}=await sb.from('weekly_events').delete().eq('id',id);
      if(error){toast(T('failed')+' '+error.message);return;}
      events=events.filter(e=>e.id!==id); renderList(); toast(T('removed'));
    });
  }
}

function wireForm(){
  const nameSel=document.getElementById('evName'), customWrap=document.getElementById('customWrap');
  nameSel.onchange=()=>{ customWrap.style.display=(nameSel.value==='__custom')?'block':'none'; };
  document.querySelectorAll('#hourQuick .qbtn').forEach(b=>b.onclick=()=>{
    document.getElementById('evHour').value=b.dataset.h;
    document.querySelectorAll('#hourQuick .qbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
  document.getElementById('addBtn').onclick=async()=>{
    const name=(nameSel.value==='__custom')?document.getElementById('evCustom').value.trim():nameSel.value;
    if(!name){toast(T('nameFirst'));return;}
    const day=Number(document.getElementById('evDay').value);
    const hour=Number(document.getElementById('evHour').value);
    const note=document.getElementById('evNote').value.trim();
    const btn=document.getElementById('addBtn');
    btn.disabled=true;
    const{data,error}=await sb.from('weekly_events').insert({state_id:S,name,day_of_week:day,hour_utc:hour,note:note||null}).select().single();
    btn.disabled=false; btn.textContent=T('addBtn');
    if(error){toast(T('failed')+' '+error.message);return;}
    events.push(data);
    events.sort((a,b)=>a.day_of_week-b.day_of_week||a.hour_utc-b.hour_utc);
    renderList(); toast(T('added'));
    document.getElementById('evNote').value='';
    if(nameSel.value==='__custom') document.getElementById('evCustom').value='';
  };
}

async function init(){
  PhxI18N.init(DICT, ()=>{ render(); });
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    const{data:rows}=await sb.from('players').select('role,state_id').eq('owner',session.user.id);
    isLeader=(rows||[]).some(p=>p.role==='admin'||((p.role==='r4'||p.role==='r5')&&p.state_id===S));
  }
  await loadEvents();
  render();
  setInterval(()=>{ if(events.length) renderList(); },60000);
}
init();
</script>
</body>
</html>
