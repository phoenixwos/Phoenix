<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Canjeo de Códigos · Phoenix</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a1420;--bg-deep:#060d16;--panel:#101f34;--panel-2:#16283f;--line:#223a54;
    --ice:#7fd9ee;--ice-dim:#4f95a8;--ok:#3da76e;--warn:#f0b93d;--err:#e05a5a;--text:#eaf3f9;--text-dim:#86a0b7;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#10233a 0%,var(--bg) 55%,var(--bg-deep) 100%);
    color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:16px 14px 60px;}
  h1{font-family:'Rajdhani',sans-serif;font-size:1.4rem;margin:0 0 4px;text-shadow:0 0 18px rgba(127,217,238,.25);}
  .wrap{max-width:480px;margin:0 auto;}
  header{text-align:center;margin-bottom:16px;}
  .eyebrow{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ice-dim);margin-bottom:4px;}
  p.sub{font-size:.82rem;color:var(--text-dim);margin:0;}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
    border-radius:14px;padding:16px;margin-bottom:14px;}
  .panel-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ice-dim);margin-bottom:10px;font-weight:600;}
  input[type=text]{width:100%;background:var(--bg-deep);border:1px solid var(--line);border-radius:9px;
    padding:11px 12px;color:var(--text);font-size:.95rem;box-sizing:border-box;text-transform:none;}
  input[type=text].captcha-input{text-align:center;font-size:1.3rem;letter-spacing:.2em;font-weight:700;}
  .btn{width:100%;background:var(--ice);border:none;color:#06222b;padding:13px;border-radius:10px;
    font-weight:700;font-size:.95rem;cursor:pointer;margin-top:10px;}
  .btn:disabled{opacity:.5;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text-dim);}

  .progress{font-size:.78rem;color:var(--text-dim);margin-bottom:10px;text-align:center;}
  .player-card{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .player-avatar{width:38px;height:38px;border-radius:10px;background:var(--bg-deep);display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:var(--ice);flex-shrink:0;}
  .player-name{font-weight:600;font-size:.9rem;}
  .player-id{font-size:.72rem;color:var(--text-dim);}

  .captcha-box{display:flex;flex-direction:column;align-items:center;gap:10px;margin:12px 0;}
  .captcha-img{border-radius:8px;border:1px solid var(--line);min-height:60px;min-width:140px;
    display:flex;align-items:center;justify-content:center;background:var(--bg-deep);}
  .captcha-img img{display:block;max-width:100%;}

  .result-list{max-height:50vh;overflow-y:auto;}
  .result-row{display:flex;align-items:center;gap:8px;padding:8px 4px;font-size:.82rem;border-bottom:1px solid var(--line);}
  .result-row:last-child{border-bottom:none;}
  .result-icon{width:20px;text-align:center;flex-shrink:0;}
  .result-name{flex:1;}
  .result-tag{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600;}
  .tag-ok{background:rgba(61,167,110,.18);color:#7be0a4;}
  .tag-warn{background:rgba(240,185,61,.18);color:var(--warn);}
  .tag-err{background:rgba(224,90,90,.18);color:#ff9d9d;}

  .summary{display:flex;gap:8px;margin-bottom:12px;}
  .summary-chip{flex:1;text-align:center;padding:10px 6px;border-radius:10px;font-size:.78rem;font-weight:600;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0d1b2a;color:#fff;
    padding:10px 20px;border-radius:14px;font-weight:600;font-size:.85rem;opacity:0;transition:.25s;
    z-index:999;border:1px solid var(--line);}
  .toast.show{opacity:1;}
  .gate{max-width:420px;margin:80px auto;text-align:center;font-size:.9rem;color:var(--text-dim);}
  #app{display:none;}
  .hidden{display:none !important;}
  .errmsg{color:#ff9d9d;font-size:.8rem;margin-top:8px;text-align:center;}
</style>
</head>
<body>
<div class="gate" id="gate">Comprobando acceso…</div>

<div class="wrap" id="app">
  <header>
    <div class="eyebrow">Phoenix · Herramienta R4/R5</div>
    <h1>🎁 Canjeo de Códigos</h1>
    <p class="sub">Etapa A — tú escribes el captcha, el resto es automático</p>
  </header>

  <div class="panel" id="setupPanel">
    <div class="panel-title">Código de regalo</div>
    <input type="text" id="codeInput" placeholder="Ej. WOS0706" maxlength="30">
    <button class="btn" id="startBtn">▶️ Empezar canjeo para mi alianza</button>
    <div class="errmsg" id="setupErr"></div>
  </div>

  <div class="panel hidden" id="runPanel">
    <div class="progress" id="progressText"></div>
    <div class="player-card" id="playerCard"></div>
    <div id="stepArea"></div>
  </div>

  <div class="panel hidden" id="summaryPanel">
    <div class="panel-title">Resumen</div>
    <div class="summary" id="summaryChips"></div>
    <div class="result-list" id="resultList"></div>
    <button class="btn btn-ghost" id="restartBtn">🔄 Canjear otro código</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://vghutrfcrqgelvgdeesl.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnaHV0cmZjcnFnZWx2Z2RlZXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDQ4ODksImV4cCI6MjA5Nzc4MDg4OX0.uarvB0sTDPqS1AysfvDRJahRYRLiJaBO2kVIiyGaDAE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
const FN_URL = SUPA_URL + '/functions/v1/swift-processor';

let currentUser=null, accessToken=null, allianceId=null;
let roster=[], results=[], code='';
let currentIndex=0;

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

async function callFn(action, extra){
  const res = await fetch(FN_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},
    body: JSON.stringify({action, ...extra})
  });
  return await res.json();
}

document.getElementById('startBtn').addEventListener('click', async()=>{
  code = document.getElementById('codeInput').value.trim();
  const errEl=document.getElementById('setupErr'); errEl.textContent='';
  if(!code){errEl.textContent='Escribe un código.';return;}
  const btn=document.getElementById('startBtn'); btn.disabled=true; btn.textContent='Cargando roster…';

  const{data:players,error}=await sb.from('players').select('governor_id,name').eq('alliance_id',allianceId).not('governor_id','is',null);
  btn.disabled=false; btn.textContent='▶️ Empezar canjeo para mi alianza';
  if(error){errEl.textContent='Error cargando el roster: '+error.message;return;}
  roster=(players||[]).filter(p=>p.governor_id);
  if(roster.length===0){errEl.textContent='Tu roster no tiene Governor IDs guardados.';return;}

  results=[]; currentIndex=0;
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('runPanel').classList.remove('hidden');
  processNext();
});

async function processNext(){
  if(currentIndex>=roster.length){ showSummary(); return; }
  const player=roster[currentIndex];
  document.getElementById('progressText').textContent=`${currentIndex+1} / ${roster.length}`;
  document.getElementById('playerCard').innerHTML=`
    <div class="player-avatar">${(player.name||'??').slice(0,2).toUpperCase()}</div>
    <div><div class="player-name">${player.name||'(sin nombre)'}</div><div class="player-id">ID ${player.governor_id}</div></div>`;
  const stepArea=document.getElementById('stepArea');
  stepArea.innerHTML=`<p style="text-align:center;color:var(--text-dim);font-size:.85rem;">Conectando…</p>`;

  const login = await callFn('login',{fid:player.governor_id});
  if(!login || login.code!==0){
    recordResult(player,'err','ID inválido o error de conexión');
    return processNext();
  }

  await runCaptchaAttempt(player, 1);
}

async function runCaptchaAttempt(player, attempt){
  const stepArea=document.getElementById('stepArea');
  if(attempt>4){
    recordResult(player,'err','No se pudo resolver el captcha tras varios intentos');
    return processNext();
  }
  stepArea.innerHTML=`<p style="text-align:center;color:var(--text-dim);font-size:.85rem;">Cargando captcha…</p>`;
  const captchaRes = await callFn('captcha',{fid:player.governor_id});
  const img = captchaRes?.data?.img;
  if(!img){
    stepArea.innerHTML=`<p style="text-align:center;color:var(--text-dim);font-size:.85rem;">Captcha no disponible, reintentando…</p>`;
    await new Promise(r=>setTimeout(r,1500));
    return runCaptchaAttempt(player, attempt+1);
  }

  stepArea.innerHTML=`
    <div class="captcha-box">
      <div class="captcha-img"><img src="${img}" alt="captcha"></div>
      <input type="text" class="captcha-input" id="captchaInput" maxlength="6" autocomplete="off" placeholder="????">
      <button class="btn" id="submitCaptchaBtn" style="margin-top:0;">Confirmar</button>
      <button class="btn btn-ghost" id="skipBtn" style="margin-top:0;">Saltar este jugador</button>
    </div>`;
  document.getElementById('captchaInput').focus();
  document.getElementById('skipBtn').onclick=()=>{recordResult(player,'warn','Saltado manualmente');processNext();};
  document.getElementById('submitCaptchaBtn').onclick=async()=>{
    const val=document.getElementById('captchaInput').value.trim();
    if(!val)return;
    const btn=document.getElementById('submitCaptchaBtn'); btn.disabled=true; btn.textContent='Canjeando…';
    const redeem = await callFn('redeem',{fid:player.governor_id, cdk:code, captcha_code:val});
    const msg=(redeem?.msg||'').toUpperCase();

    if(['SUCCESS','RECEIVED','SAME TYPE EXCHANGE'].includes(msg)){
      recordResult(player,'ok', msg==='RECEIVED' || msg==='SAME TYPE EXCHANGE' ? 'Ya canjeado antes' : 'Canjeado ✓');
      return processNext();
    }
    if(msg.includes('CAPTCHA')){
      stepArea.innerHTML=`<p style="text-align:center;color:var(--warn);font-size:.85rem;">Captcha incorrecto, prueba otra vez…</p>`;
      await new Promise(r=>setTimeout(r,600));
      return runCaptchaAttempt(player, attempt+1);
    }
    if(msg.includes('NOT EXIST') || msg.includes('CDK NOT FOUND')){
      recordResult(player,'err','El código no existe');
      // Stop entirely — this affects everyone, not just this player.
      currentIndex=roster.length;
      return processNext();
    }
    if(msg.includes('EXPIRED')){
      recordResult(player,'err','El código ha caducado');
      currentIndex=roster.length;
      return processNext();
    }
    recordResult(player,'err', redeem?.msg || 'Error desconocido');
    return processNext();
  };
}

function recordResult(player, kind, label){
  results.push({name:player.name||player.governor_id, gid:player.governor_id, kind, label});
  currentIndex++;
}

function showSummary(){
  document.getElementById('runPanel').classList.add('hidden');
  document.getElementById('summaryPanel').classList.remove('hidden');
  const ok=results.filter(r=>r.kind==='ok').length;
  const warn=results.filter(r=>r.kind==='warn').length;
  const err=results.filter(r=>r.kind==='err').length;
  document.getElementById('summaryChips').innerHTML=`
    <div class="summary-chip" style="background:rgba(61,167,110,.15);color:#7be0a4;">✅ ${ok}</div>
    <div class="summary-chip" style="background:rgba(240,185,61,.15);color:var(--warn);">⚠️ ${warn}</div>
    <div class="summary-chip" style="background:rgba(224,90,90,.15);color:#ff9d9d;">❌ ${err}</div>`;
  const list=document.getElementById('resultList');
  list.innerHTML='';
  results.forEach(r=>{
    const icon=r.kind==='ok'?'✅':r.kind==='warn'?'⚠️':'❌';
    const tagClass=r.kind==='ok'?'tag-ok':r.kind==='warn'?'tag-warn':'tag-err';
    const row=document.createElement('div');
    row.className='result-row';
    row.innerHTML=`<span class="result-icon">${icon}</span><span class="result-name">${r.name}</span><span class="result-tag ${tagClass}">${r.label}</span>`;
    list.appendChild(row);
  });
}

document.getElementById('restartBtn').addEventListener('click',()=>{
  document.getElementById('summaryPanel').classList.add('hidden');
  document.getElementById('setupPanel').classList.remove('hidden');
  document.getElementById('codeInput').value='';
});

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){document.getElementById('gate').textContent='Inicia sesión en Phoenix primero.';return;}
  currentUser=session.user; accessToken=session.access_token;

  const{data:rows}=await sb.from('players').select('role,alliance_id').eq('owner',currentUser.id);
  const staffRow=(rows||[]).find(p=>['admin','r4','r5'].includes(p.role));
  if(!staffRow){document.getElementById('gate').textContent='Esta herramienta es solo para admin/R4/R5.';return;}
  allianceId=staffRow.alliance_id;
  if(!allianceId){document.getElementById('gate').textContent='Tu perfil no tiene alianza asignada.';return;}

  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
}
init();
</script>
</body>
</html>
